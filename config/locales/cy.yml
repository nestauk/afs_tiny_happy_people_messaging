    privacy_policy:
      page_title: "Polisi Preifatrwydd"
      title: "Polisi Preifatrwydd"
      body: |
        <p>Mae’r wefan hon yn cael ei berchnogi a’i gweithredu gan Nesta – gallwch ddod o hyd i’n manylion llawn isod. Mae’r polisi preifatrwydd hwn yn egluro sut mae Nesta yn defnyddio gwybodaeth bersonol a gasglwn drwy’r wefan hon. Rydym wedi ymrwymo i ddiogelu eich preifatrwydd ac rydym yn cymryd pob cam rhesymol i warchod gwybodaeth bersonol.</p>
        <h2 class="mt-6">Pa fath o wybodaeth ydym ni’n ei chasglu?</h2>
        <p class="mb-4"><span class=’font-bold’>Manylion cofrestru:</span> Os byddwch yn cofrestru ar ein rhaglen negeseuon testun, byddwn yn gofyn am wybodaeth bersonol megis eich enw, rhif ffôn a chod post yn ogystal â mis a blwyddyn geni eich plentyn. Byddwn hefyd yn gofyn am wybodaeth ddewisol i bersonoli’ch profiad megis enw neu lysenw eich plentyn, ac am wybodaeth ddewisol i wella’n gwasanaeth megis eich diddordebau.</p>
        <p class="mb-4"><span class=’font-bold’>Ymchwil:</span> Efallai y gofynnwn i chi gymryd rhan mewn ymchwil rydym yn ei chynnal ac efallai y byddwn yn cysylltu â chi i ofyn am ragor o wybodaeth amdanoch chi, eich profiadau neu eich barn.</p>
        <p class="mb-4"><span class=’font-bold’>Adborth ac arolygon:</span> Efallai y gofynnwn hefyd am eich adborth neu i chi gwblhau arolygon.</p>
        <p class="mb-4"><span class=’font-bold’>Gweithgarwch ar-lein:</span> Pan fyddwch yn defnyddio’n gwefan, rydym yn casglu gwybodaeth am y ddyfais a ddefnyddiwyd gennych i gael mynediad, eich ymweliadau a’ch defnydd o’r wefan gan gynnwys math a fersiwn eich porwr, cyfeirydd a gweithgarwch. Rydym yn casglu’r wybodaeth hon drwy offer dadansoddi cyntaf barti sydd wedi’u hymgorffori yn ein gwefan, heb ddefnyddio cwcis nac offer trydydd parti.</p>
        <h2 class="mt-6">Beth ydym ni’n ei wneud gyda’r wybodaeth a gasglwn a beth yw ein sail gyfreithiol ar gyfer hyn?</h2>
        <p class="mb-4"><span class=’font-bold’>Manylion cofrestru:</span> Os byddwch yn cofrestru ar ein rhaglen negeseuon testun, byddwn yn defnyddio eich gwybodaeth bersonol i anfon negeseuon testun atoch. Ein sail gyfreithiol ar gyfer hyn yw eich caniatâd. Mae gennych hawl i dynnu’r caniatâd hwn yn ôl unrhyw bryd. Byddwn hefyd yn rhannu codau post gyda’n partner, Prifysgol Sheffield, a fydd yn eu cymharu â’r rheini o gyfranogwyr ymchwil CBeebies Parenting, yn unol â’n cytundeb rhannu data.</p>
        <p class="mb-4"><span class=’font-bold’>Proseswyr trydydd parti:</span> Rydym yn defnyddio prosesydd trydydd parti o’r enw Twilio i gyflwyno negeseuon testun. Wrth ddefnyddio’r trydydd parti hwn rydym yn dilyn ein budd cyfreithlon i ddefnyddio technoleg trydydd parti i sicrhau mwy o effeithlonrwydd yn ein sefydliad. I gydbwyso ein buddiannau â’ch rhai chi, rydym yn ymrwymo i gytundebau cyfreithiol gyda Twilio ac yn cymryd camau i sicrhau eu bod yn cynnal mesurau technegol a threfniadol priodol i gadw eich gwybodaeth bersonol yn ddiogel. Am fwy o wybodaeth, gweler <a href=’https://www.twilio.com/en-us/privacy’ target=’_blank’>polisi preifatrwydd Twilio</a>.</p>
        <p class="mb-4"><span class=’font-bold’>Ymchwil:</span> Os cytunwch i gymryd rhan mewn unrhyw ymchwil, gan gynnwys ein hastudiaeth ddyddiadur, byddwn yn defnyddio’ch gwybodaeth at ddiben y prosiect neu raglen ymchwil honno. Rhoddir manylion llawn i chi am sut y caiff eich gwybodaeth ei defnyddio pan fyddwch yn cytuno i gymryd rhan; gall hyn gynnwys llywio datblygiad gwobr newydd, prosiect, rhaglen neu fenter arall, cael ei gynnwys mewn adroddiadau neu ganlyniadau ymchwil eraill, a gall gynnwys cael ei harddangos yn gyhoeddus ar dudalennau gwe sy’n gysylltiedig â’r prosiect neu raglen ymchwil benodol.</p>
        <p class="mb-4"><span class=’font-bold’>Adborth ac arolygon:</span> Os byddwch yn cytuno i roi adborth neu gwblhau arolwg, byddwn yn defnyddio’r wybodaeth i wella ein gwaith a’n gweithgareddau. Rydym fel arfer yn defnyddio Alchemer i brosesu arolygon, ac maent ond yn prosesu’ch gwybodaeth yn unol â’n cyfarwyddiadau.</p>
        <p class="mb-4">Mae Alchemer yn gweithredu yn yr UD. Am fwy o wybodaeth, gweler <a href=’https://www.alchemer.com/privacy/’ target=’_blank’ class=’link’>polisi preifatrwydd Alchemer</a>. Os byddwch yn cytuno i gymryd rhan mewn unrhyw arolwg sy’n rhan o brosiect ymchwil, byddwn yn dweud wrthych ar y pryd sut y caiff eich gwybodaeth ei defnyddio ar gyfer y prosiect ymchwil hwnnw, a pha mor hir y caiff ei chadw.</p>
        <p class="mb-4"><span class=’font-bold’>Ar gyfer pob math o wybodaeth a gasglwyd:</span> Sicrhewch fod yr holl fanylion personol a roddwch yn gywir ac yn gyfredol, a rhowch wybod i ni am unrhyw newidiadau. Sicrhewch eich bod wedi cael caniatâd cyn rhoi gwybodaeth am unrhyw un arall i ni.</p>
        <p class="mb-4">Mae natur gwaith Nesta yn golygu ein bod yn aml yn gweithio mewn partneriaeth ag sefydliadau eraill, ond ni fyddwn yn rhannu’ch gwybodaeth ag unrhyw sefydliad arall oni bai fod gennym eich caniatâd chi’n gyntaf, neu fod gennym fuddiant cyfreithlon neu ofyniad cyfreithiol i wneud hynny.</p>
        <p class="mb-4">Gallwn hefyd ddefnyddio’ch gwybodaeth i gynnal dadansoddiadau ac ymchwil i wella ein cyhoeddiadau, digwyddiadau a gweithgareddau, addasu ein gwefan a’i chynnwys yn unol â’ch dewisiadau penodol, eich hysbysu am unrhyw newidiadau i’n gwefan neu’n gweithgareddau a allai effeithio arnoch, atal a chanfod twyll ac ymddygiad camdriniol, a diogelu defnyddwyr eraill.</p>
        <p class="mb-4">Waeth sut rydych yn dewis ymgysylltu â Nesta, gallwn gadw eich gwybodaeth ar gyfer ein buddiannau busnes cyfreithlon ein hunain at ddibenion dadansoddi ystadegol, er mwyn adolygu, datblygu a gwella ein gweithgareddau busnes. Yn y sefyllfa hon, dim ond os yw’n angenrheidiol y byddwn yn cadw unrhyw wybodaeth bersonol, ac fe wnawn bob amser roi mesurau technegol a gweinyddol priodol ar waith, gan gynnwys lle bo modd, anhysbysu neu leihau’r wybodaeth bersonol a gedwir.</p>
        <p>Rydym yn defnyddio trydydd parti i ddarparu gwasanaeth cadw data, storio a gwella diogelwch ar sail cwmwl i gefnogi data rydym yn ei gadw.</p>
        <h2 class="mt-6">Am ba hyd y byddwn yn cadw’ch gwybodaeth?</h2>
        <p class="mb-4"><span class=’font-bold’>Egwyddor gyffredinol:</span> Byddwn ond yn cadw unrhyw wybodaeth bersonol rydych yn ei rhoi i ni cyhyd ag y bo’n angenrheidiol i gyflawni’r diben y rhoddoch y wybodaeth i ni ar ei gyfer. Byddwn yn dileu’r wybodaeth yn ddiogel pan na fydd ei hangen mwyach at y diben hwnnw, fel yr eglurir yn fwy manwl isod.</p>
        <p class="mb-4"><span class=’font-bold’>Caniatâd:</span> Rydym yn cadw cofnodion o ganiatâd, ac unrhyw ddirymiad o ganiatâd, ar ein ffeiliau cyhyd ag y defnyddir eich gwybodaeth bersonol yn unol â’r caniatâd hwnnw ac am gyfnod o 6 blynedd ar ôl i’r caniatâd gael ei ddirymu (oni bai eich bod yn gofyn fel arall).</p>
        <p class="mb-4"><span class=’font-bold’>Ymchwil:</span> Os byddwch yn cytuno i gymryd rhan mewn unrhyw ymchwil, bydd eich gwybodaeth bersonol yn cael ei chadw cyhyd ag y bydd o werth i Nesta a’r gymuned ymchwil ehangach, ac am gyhyd ag y bydd unrhyw gyllid ymchwil allanol, deddfau patent, neu ofynion deddfwriaethol neu reoleiddiol eraill yn mynnu. Bydd data ymchwil yn cael ei adolygu o leiaf bob 5 mlynedd i asesu’i werth parhaus i Nesta, a bydd data personol yn cael ei anhysbysu neu ei seudoanhysbysu lle bo’n bosibl, oni bai y byddai gwneud hynny’n effeithio ar gywirdeb y data ymchwil a/neu ei ganlyniadau. Bydd unrhyw Ddata Personol sy’n ymddangos mewn adroddiad ymchwil neu ganlyniad arall yn cael ei gadw am byth. Bydd ymchwil sy’n cefnogi datblygiad gwobr, prosiect, rhaglen, cyhoeddiad neu ganlyniad arall yn cael ei gadw am o leiaf 5 mlynedd ar ôl cyhoeddi. Os yw’r ymchwil yn cael ei hariannu neu’n destun unrhyw gytundeb arall, gellir cadw eich data am 6 blynedd ar ôl diwedd y cytundeb, neu’n hirach os yw’r cytundeb yn nodi hynny – hyd at 12 mlynedd posibl.</p>
        <p class="mb-4"><span class=’font-bold’>Prosesu at ddibenion dadansoddi ystadegol:</span> Dim ond tra bod eich gwybodaeth bersonol yn cael ei chadw yn unol â’r egwyddorion uchod y caiff y math hwn o brosesu ei gynnal.</p>
        <h2 class="mt-6">Diogelwch</h2>
        <p>Rydym yn cymryd camau i ddiogelu eich gwybodaeth bersonol ac yn dilyn gweithdrefnau sydd wedi’u cynllunio i leihau mynediad neu ddatgeliad heb awdurdod.</p>
        <h2 class="mt-6">Cysylltu â ni, arfer eich hawliau a chwynion</h2>
        <p>Mae gennych hawl gyfreithiol i wybod pa wybodaeth bersonol sydd gennym amdanoch a sut mae’r wybodaeth honno’n cael ei phrosesu, gan gynnwys yr hawl i:</p>
        <ul class=’list-disc pl-4 pt-2 mb-4’>
          <li>ofyn i ni gywiro unrhyw wallau yn eich gwybodaeth sydd gennym</li>
          <li>ofyn i ni ddileu’ch gwybodaeth bersonol</li>
          <li>ofyn i ni roi’r gorau i ddefnyddio’ch gwybodaeth neu gyfyngu ar ei defnyddio, er enghraifft os ydych yn teimlo ei bod yn anghywir neu nad oes angen iddi gael ei defnyddio mwyach gan Nesta</li>
          <li>gwrthwynebu i ni ddefnyddio’ch gwybodaeth bersonol</li>
          <li>gwrthwynebu unrhyw benderfyniadau awtomataidd rydym yn eu gwneud gan ddefnyddio’ch gwybodaeth</li>
        </ul>
        <p class="mb-4">Os ydych am wybod pa wybodaeth sydd gennym amdanoch, neu am arfer unrhyw un o’ch hawliau uchod, neu os oes gennych gwyn am sut rydym yn defnyddio’ch gwybodaeth bersonol, anfonwch e-bost i information@nesta.org.uk neu ysgrifennwch atom yn 58 Victoria Embankment London EC4Y 0DS UK gan ddarparu digon o wybodaeth i’ch adnabod (e.e. enw a chyfeiriad neu unrhyw fanylion cofrestru).</p>
        <p class="mb-4">Os yw’n wybodaeth gennym yn anghywir neu’n hen, rhowch ddigon o wybodaeth i ni allu ei diweddaru. Os ydych am i ni ddileu, cyfyngu neu roi’r gorau i ddefnyddio unrhyw wybodaeth gennym amdanoch, cadarnhewch y rhesymau dros hynny. Os ydych yn anhapus â’r ffordd rydym yn defnyddio’ch gwybodaeth, esboniwch y rhesymau a byddwn yn ymchwilio i’r mater.</p>
        <p class="mb-4">Gallwch hefyd ysgrifennu i’r un cyfeiriad os oes gennych gwyn am y polisi hwn.</p>
        <p>Os ydych yn anhapus â’r ffordd y trafodwyd unrhyw gais hawliau data neu gŵyn, mae gennych hawl i gwyno i’r Comisiynydd Gwybodaeth:</p>
        <ul class=’list-disc pl-4 pt-2 mb-4’>
          <li>Ar <a href=’https://ico.org.uk/concerns’ target=’_blank’ class=’link’>wefan yr ICO</a>;</li>
          <li>Trwy’r post yn Wycliff House, Water Lane, Wilmslow, Cheshire SK9 5AF, neu</li>
          <li>Trwy ffonio’r llinell gymorth ar 0303 123 1113.</li>
        </ul>
        <p>Mae’r wybodaeth gyswllt ar gyfer Swyddfa’r Comisiynydd Gwybodaeth yn gywir ar adeg cyhoeddi’r polisi preifatrwydd hwn.</p>
        <h2 class="mt-6">Newidiadau i’r polisi preifatrwydd</h2>
        <p class="mb-4">Efallai y byddwn yn newid y polisi preifatrwydd hwn o bryd i’w gilydd. Byddwn yn eich hysbysu o unrhyw newidiadau sy’n ymwneud â gwybodaeth sydd gennym eisoes amdanoch, lle bo hynny’n ymarferol. Dylech wirio’r polisi hwn o bryd i’w gilydd i sicrhau eich bod yn ymwybodol o’r fersiwn fwyaf diweddar a fydd yn berthnasol bob tro rydych yn defnyddio’r wefan hon.</p>
        <p>Nesta, cwmni cyfyngedig trwy warant wedi’i gofrestru yn Lloegr a Chymru rhif cwmni 7706036 a rhif elusen 1144091.<br>Wedi’i gofrestru fel elusen yn yr Alban rhif SC042833.<br>Swyddfa gofrestredig: 58 Victoria Embankment, Llundain, EC4Y 0DS<br>E-bost: information@nesta.org.uk</p>
    resources:
      page_title: "Adnoddau i ofalwyr"
      title: "Adnoddau i ofalwyr"
      text: "Rydym wedi llunio rhestr o adnoddau defnyddiol isod i’ch cefnogi wrth lywio unrhyw heriau y gallech eu hwynebu wrth ofalu am eich rhai bach."
      england:
        body: |
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="bg-pink-100 p-8 col-span-1">
              <h2><span aria-hidden="true">🧠</span> Cymorth Iechyd Meddwl i Rieni a Phlant</h2>
              <ul>
                <li class="mb-4"><span class=’font-bold’>Cymorth Iechyd Meddwl y GIG:</span> Cael cyngor am anawsterau iechyd meddwl a <a href=’https://www.nhs.uk/mental-health/’ target=’_blank’ class=’link’>dod o hyd i gymorth lleol</a></li>
                <li class="mb-4"><span class=’font-bold’>Gwasanaethau Iechyd Meddwl Lleol:</span> <a href=’https://www.nhs.uk/nhs-services/gps/’ target=’_blank’ class=’link’>Ymgynghorwch â’ch Meddyg Teulu</a> i gael atgyfeiriad</li>
                <li class="mb-4"><span class=’font-bold’>Mind:</span> Ffoniwch 0300 123 3393 neu <a href=’https://www.mind.org.uk/’ target=’_blank’ class=’link’>ewch ar-lein</a> i gael gwybodaeth, cyngor a chymorth ar gyfer eich anghenion iechyd meddwl chi neu anwylyn, gan gynnwys hunan-gymorth â chefnogaeth i oedolion sy’n byw yng Nghymru, Lloegr a’r Ynysoedd Sianel</li>
                <li><span class=’font-bold’>Anna Freud:</span> Ffoniwch 020 7794 2313 neu <a href=’https://www.annafreud.org/resources/family-wellbeing/’ target=’_blank’ class=’link’>ewch ar-lein</a> i gael mynediad at adnoddau i helpu cefnogi plentyn sy’n profi anawsterau iechyd meddwl</li>
              </ul>
            </div>
            <div class="bg-yellow-100 p-8 col-span-1">
              <h2><span aria-hidden="true">🗣️</span> Anawsterau Lleferydd, Iaith a Chyfathrebu</h2>
              <ul>
                <li class="mb-4"><span class=’font-bold’>Therapi Lleferydd ac Iaith Leol:</span> Gallwch gael atgyfeiriad i adran therapi lleferydd ac iaith drwy eich Meddyg Teulu, ymwelydd iechyd, nyrs ardal, staff meithrin neu athro eich plentyn, canolfan plant, pediatregydd cymunedol neu drwy’r sector preifat. Gallwch hefyd eich atgyfeirio eich hun drwy ffonio eich gwasanaeth GIG lleol a gofyn am rif therapi lleferydd ac iaith.</li>
                <li class="mb-4"><span class=’font-bold’>Canllawiau’r GIG:</span> Gweler <a href=’https://www.cpft.nhs.uk/speech-and-language-therapy-toolkit/’ target=’_blank’ class=’link’>Pecyn Cymorth Therapi Lleferydd ac Iaith y GIG Cambridgeshire a Peterborough</a> am awgrymiadau a chyngor i helpu gyda datblygiad sgiliau lleferydd, iaith a chyfathrebu plant a phobl ifanc.<br><br>Os nad ydych yn byw yng Nghaergrawnt na Peterborough ond hoffech wybod ble i gael cymorth lleol ar gyfer lleferydd, iaith a chyfathrebu eich plentyn, <a href=’https://www.gov.uk/find-local-council’ target=’_blank’ class=’link’>darganfyddwch wefan eich cyngor lleol</a>.</li>
              </ul>
            </div>
            <div class="bg-purple-100 p-8 col-span-1">
              <h2><span aria-hidden="true">💰</span> Cymorth Ariannol</h2>
              <ul>
                <li class="mb-4"><span class=’font-bold’>Gwiriwr Budd-daliadau:</span> Defnyddiwch <a href=’https://www.turn2us.org.uk/’ target=’_blank’ class=’link’>Turn2Us</a> i wirio eich cymhwystra i gael budd-daliadau.</li>
                <li class="mb-4"><span class=’font-bold’>Cyngor ar Bopeth:</span> Ffoniwch 0800 144 8848 (Lloegr) neu 0800 702 2020 (Cymru) neu ewch i <a href=’https://www.citizensadvice.org.uk/’ target=’_blank’ class=’link’>wefan Cyngor ar Bopeth</a> i gael arweiniad ar faterion ariannol ac eraill.</li>
              </ul>
            </div>
            <div class="bg-orange-100 p-8 col-span-1">
              <h2><span aria-hidden="true">📈</span> Datblygiad Plant</h2>
              <ul>
                <li class="mb-4"><span class=’font-bold’>Camau datblygu yn ôl oedran:</span> Gwiriwch <a href=’https://cambspborochildrenshealth.nhs.uk/child-development-and-growing-up/milestones/’ target=’_blank’ class=’link’>tudalen Camau Datblygu’r GIG Cambridgeshire a’r Gymuned</a> am ganllaw bras ar gamau datblygiadol plant a phryd i gysylltu ag ymwelydd iechyd.<br><br>Os nad ydych yn byw yng Nghaergrawnt ond hoffech wybod ble i gael cymorth lleol mewn perthynas â datblygiad eich plentyn, <a href=’https://www.gov.uk/find-local-council’ target=’_blank’ class=’link’>darganfyddwch wefan eich cyngor lleol</a>.</li>
                <li class="mb-4"><span class=’font-bold’>Gweithgareddau i hyrwyddo datblygiad plant:</span> Defnyddiwch wefan <a href=’https://www.bbc.co.uk/tiny-happy-people’ target=’_blank’ class=’link’>CBeebies Parenting</a> i gael syniadau ar gyfer gweithgareddau i hybu datblygiad eich plentyn. Dyma un o’r gwefannau y gofynnon ni i chi eu gweld yn eich cyfweliad gyda ni.</li>
              </ul>
            </div>
            <div class="bg-red-100 p-8 col-span-1">
              <h2><span aria-hidden="true">🚨</span> Cymorth Brys</h2>
              <ul>
                <li class="mb-4"><span class=’font-bold’>Childline (DU):</span> Ffoniwch 0800 1111 am le diogel, cyfrinachol i siarad â chynghorydd, ar gael 24/7 i unrhyw un o dan 19 oed ledled y DU</li>
                <li class="mb-4"><span class=’font-bold’>Samaritans:</span> Ffoniwch 116 123 am le diogel, cyfrinachol i siarad, ar gael 24/7 i bobl o bob oed yn y DU ac Iwerddon</li>
                <li class="mb-4"><span class=’font-bold’>Cymorth meddygol nad yw’n peryglu bywyd:</span> Ffoniwch 111 i gael help gyda’ch symptomau meddygol neu os nad ydych yn siŵr ble i gael cymorth ar gyfer pryder meddygol brys. Mae’r llinell gymorth ar gael 24/7.</li>
                <li class="mb-4"><span class=’font-bold’>Gwasanaethau Brys:</span> Ffoniwch 999 mewn sefyllfaoedd sy’n peryglu bywyd, ar gael 24/7 ac yn rhad ac am ddim ledled y DU.</li>
              </ul>
            </div>
          </div>
