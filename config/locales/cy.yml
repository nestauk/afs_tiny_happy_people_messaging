      free: | 
        <p>Mae’r gwasanaeth hwn yn rhad ac am ddim, ac fe fydd felly o hyd.</p>
        <p class='mt-2'>Mae’r gweithgareddau yn y fideos hyn yn dangos y math o ddatblygiad a welir yn aml rhwng 9 a 18 mis oed. Os yw eich plentyn wedi cael diagnosis o anhawster lleferydd, iaith neu gyfathrebu, neu oedi datblygiadol, neu os oes gennych unrhyw bryderon am hynny, efallai y bydd ei ddatblygiad yn edrych yn wahanol i’r hyn a welwch yma.</p>
        <p class='mt-2'>Os yw eich plentyn wedi cael diagnosis o anhawster lleferydd, iaith neu gyfathrebu, neu oedi datblygiadol—neu os oes gennych bryderon am y materion hyn—gallai eu cynnydd edrych yn wahanol i’r hyn a welwch yma.</p>
        <p class='mt-2'>Os cafodd eich plentyn ei eni’n gynamserol, mae’n bosibl y bydd yn datblygu ar amserlen ychydig yn wahanol, ac mae hynny’n gwbl normal.</p>
        <p class='mt-2 mb-4'>Gellir mwynhau llawer o’r gweithgareddau hyn a’u haddasu ar gyfer ystod eang o gamau datblygiadol. Ond rydym yn eich annog i ystyried anghenion unigol eich plentyn ac, os byddai hynny’n ddefnyddiol, i geisio cyngor gan weithiwr proffesiynol perthnasol er mwyn cael y gorau o’r gweithgareddau hyn.</p>
