                </li>
                <li>
                  <a href="https://parents.actionforchildren.org.uk/parent-talk-cymru/" target="_blank" class="link">Parent Talk Cymru</a> → sgwrsio â hyfforddwr rhianta drwy WhatsApp
                </li>
                <li>
                  <a href="https://www.annafreud.org/" target="_blank" class="link">Canolfan Anna Freud</a> → canllawiau i rieni i gefnogi plentyn sy’n profi anawsterau iechyd meddwl
