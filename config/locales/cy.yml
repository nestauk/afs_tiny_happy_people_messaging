      title: "Amdanom ni"
      body: |
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Gweithgareddau hwyliog am ddim i gefnogi datblygiad eich plentyn</h2>
        <p>Cewch weithgareddau byr, defnyddiol a difyr gan arbenigwyr yn syth i’ch ffôn bob wythnos.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Pam cofrestru?</h2>
        <p class="mb-3">Mae rhieni’n cael gweithgareddau byr am ddim, wedi’u creu gan arbenigwyr, yn syth i’w ffôn bob wythnos.</p>
        <p>Mae rhaglen negeseuon testun CBeebies Parenting wedi’i chynllunio i gynnig cymorth i rieni mewn ffordd sy’n teimlo’n berthnasol i’ch teulu chi. Gallwch dderbyn negeseuon ar amser sy’n addas i chi a’ch bywyd bob dydd. Daw pob gweithgaredd o gasgliad fideos CBeebies Parenting gan BBC Education, sydd wedi’u cynllunio gan arbenigwyr i gefnogi iaith a dysgu eich plentyn, a chryfhau’r berthynas rhyngoch.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Ynglŷn â Nesta</h2>
        <p>Mae rhaglen negeseuon testun CBeebies Parenting yn wasanaeth sy’n cael ei redeg gan Nesta, asiantaeth arloesi’r DU ar gyfer lles cymdeithasol, mewn partneriaeth â Phrifysgol Sheffield a BBC Education. Mae tîm Dechrau Teg Nesta yn gweithio i dorri’r cysylltiad rhwng cefndir teuluol a chyfleoedd mewn bywyd. Ein nod yw sicrhau erbyn 2030 fod pob plentyn yn cael yr un cyfle i ddatblygu i’w lawn botensial yn y blynyddoedd cynnar.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900" id="our_partners">Ynglŷn â’n partneriaid</h2>
        <p class="mb-3">Datblygwyd rhaglen negeseuon testun CBeebies Parenting yn wreiddiol gan yr Athro Danielle Matthews ym Mhrifysgol Sheffield a BBC Education. Ei bwriad oedd darparu adnoddau ar-lein CBeebies Parenting i ofalwyr drwy neges destun, ac asesu drwy dreial a oedd anfon y fideos hyn at deuluoedd yn cefnogi’r berthynas rhwng gofalwr a phlentyn, ac yn arwain at well canlyniadau iaith i blant.</p>
        <p>Ers 2024, mae Nesta wedi bod yn gweithio mewn partneriaeth arloesi gyda’r Athro Danielle Matthews a BBC Education i ddatblygu’r rhaglen ymhellach. Ers dechrau’r bartneriaeth, mae Nesta wedi bod yn gweithio i barhau i ddatblygu, profi ac ehangu’r gwasanaeth er mwyn cyrraedd mwy o rieni ledled y DU a chefnogi ein nod o dorri’r cysylltiad rhwng cefndir teuluol a chyfleoedd mewn bywyd.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Cysylltwch â ni</h2>
        <p>Rydym yn gweithio mewn partneriaeth ag awdurdodau lleol ledled y DU, Prifysgol Sheffield a BBC Education i ddarparu’r gwasanaeth hwn. Cysylltwch â ni os hoffech drafod sut y gallech gyfrannu, neu sut y gallem wella’r gwasanaeth. Gallwch anfon e-bost atom ar <a href='mailto:info@cbeebies-text.uk' class='link'>info@cbeebies-text.uk</a>.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Credydau delwedd</h2>
        <p><a href="https://www.streamlinehq.com/" target="_blank" class="link">Darluniau am ddim gan Streamline</a>.</p>
