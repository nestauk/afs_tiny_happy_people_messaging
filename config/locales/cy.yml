      title: "Amdanom ni"
      body: |
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Magu twf eich plentyn gyda gweithgareddau hwyliog, am ddim</h2>
        <p>Dewch o hyd i weithgareddau bach ond pwerus, wedi’u creu gan arbenigwyr – a’u hanfon at eich ffôn bob wythnos.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Pam cofrestru?</h2>
        <p class="mb-3">Mae rhieni’n cael gweithgareddau bach, am ddim, wedi’u datblygu gan arbenigwyr, wedi’u hanfon at eu ffôn bob wythnos.</p>
        <p>Mae rhaglen negeseuon testun CBeebies Parenting wedi’i chynllunio i gynnig cefnogaeth rhianta a thaith wedi’i theilwra i anghenion unigryw eich teulu, gyda negeseuon ar yr adeg sy’n fwyaf cyfleus i rieni a’u hamserlenni prysur. Mae pob gweithgaredd yn dod o gatalog fideos CBeebies Parenting gan BBC Addysg, wedi’u cynllunio gan arbenigwyr i gefnogi iaith a dysgu eich plentyn ac i gryfhau’r bond rhyngoch chi a’ch plentyn.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Amdanom Nesta</h2>
        <p>Mae rhaglen negeseuon testun CBeebies Parenting yn wasanaeth a gynhelir gan Nesta, asiantaeth arloesi’r DU ar gyfer lles cymdeithasol, mewn partneriaeth â Phrifysgol Sheffield a BBC Addysg. Mae tîm A Fairer Start Nesta yn gweithio i dorri’r cysylltiad rhwng cefndir teuluol a chyfleoedd bywyd. Erbyn 2030, bydd gan bob plentyn yr un cyfle i ddatblygu i’w lawn botensial yn y blynyddoedd cynnar.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900" id="our_partners">Amdanom ein partneriaid</h2>
        <p class="mb-3">Datblygwyd rhaglen negeseuon testun CBeebies Parenting gyntaf gan yr Athro Danielle Matthews ym Mhrifysgol Sheffield a BBC Addysg i gyflwyno adnoddau ar-lein am ddim CBeebies Parenting i ofalwyr, ac i werthuso trwy dreialu a yw anfon fideos CBeebies Parenting trwy neges testun at deuluoedd yn cefnogi rhyngweithio rhwng gofalwyr a phlant ac, yn y pen draw, yn arwain at ganlyniadau iaith well i blant.</p>
        <p>Ers 2024, mae Nesta wedi bod yn gweithio mewn partneriaeth arloesol gyda’r Athro Danielle Matthews a BBC Addysg i ddatblygu rhaglen negeseuon testun CBeebies Parenting (THP) ymhellach. Ers dechrau ein partneriaeth, mae Nesta wedi bod yn gweithio i barhau i ddatblygu, profi a chynyddu’r rhaglen i gyrraedd mwy o rieni ar draws y DU a chyfrannu at ein nod cenhadaeth o dorri’r cysylltiad rhwng cefndir teuluol a chyfleoedd bywyd.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Cysylltwch â ni</h2>
        <p>Rydym yn gweithio mewn partneriaeth â chynghorau lleol ar draws y DU, Prifysgol Sheffield a BBC Addysg i ddarparu’r gwasanaeth hwn. Cysylltwch â ni os hoffech archwilio sut y gallwch gyfrannu neu sut gallwn wella’r gwasanaeth. Ebostiwch ni yn <a href=’mailto:info@cbeebies-text.uk’ class=’link’>info@cbeebies-text.uk</a>.</p>
