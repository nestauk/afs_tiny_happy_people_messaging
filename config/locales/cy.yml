    terms:
      page_title: "Telerau Defnyddio"
      title: "Telerau Defnyddio"
      body: |
        <p class="mb-4">Pwrpas y wefan hon yw galluogi rhieni a gofalwyr plant 9-18 mis oed i gofrestru ar raglen negeseuon testun sy’n darparu awgrymiadau a chyngor ynglŷn â themâu datblygiad plant.</p>
        <p class="mb-4">Mae’r wefan hon yn eiddo i <a href=’https://www.nesta.org.uk/’ target=’_blank’ class=’link’>Nesta</a> ac yn cael ei gweithredu ganddi – gallwch ddod o hyd i’n manylion llawn isod. Mae defnyddio’r wefan yn amodol ar y Telerau hyn. Mae ein <a href=’/privacy_policy’ class=’link’>Hysbysiad Preifatrwydd</a> yn esbonio sut rydym yn defnyddio gwybodaeth bersonol a gasglwn drwy’r wefan. Os nad ydych yn cytuno â’r Telerau hyn nac â’n Polisi Preifatrwydd, peidiwch â defnyddio’r wefan.</p>
        <p class="mb-4">Mae’r wybodaeth, deunyddiau a logos ar y wefan hon yn perthyn i Nesta, ein partneriaid neu drwyddedwyr. Nid ydym yn cynnig unrhyw sicrwydd na gwarant ynghylch y cynnwys, gan gynnwys ynglŷn ag unrhyw dor-cyfraith ar hawliau eiddo deallusol.</p>
        <p class="mb-4">Pwrpas y cynnwys ar y wefan a’r negeseuon testun yw darparu gwybodaeth yn unig ac ni fydd Nesta yn atebol am unrhyw benderfyniadau a wnewch o ganlyniad i’w ddarllen. Ni all Nesta eich digolledu am unrhyw golled a allai godi o ganlyniad i:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>gamau a gymerwch yn seiliedig ar unrhyw beth rydych yn ei ddarllen ar y tudalennau hyn;</li>
          <li>unrhyw wall yn y cynnwys ar ein gwefan;</li>
          <li>rhan o’n gwefan yn bod yn aneglur neu’n anghyraeddadwy;</li>
          <li>defnyddio gwefan unrhyw sefydliad y gallwch gyrchu ohoni (gan gynnwys unrhyw bryniant gan y sefydliad hwnnw ac unrhyw ddefnydd y maent yn ei wneud o’ch data personol);</li>
          <li>llwytho unrhyw ddeunydd i lawr o unrhyw ran o’n gwefan.</li>
        </ul>
        <p class="mb-4">Ni fydd Nesta yn eithrio unrhyw atebolrwydd sydd gennym os ydym wedi bod yn dwyllodrus neu os ydym wedi esgeuluso a, o ganlyniad, wedi achosi marwolaeth neu anaf personol.</p>
        <p class="mb-4">Gellir argraffu, copïo neu lawrlwytho unrhyw gynnwys o’r wefan, ar yr amod ei fod i’w ddefnyddio’n breifat ac yn bersonol yn unig. Ni chewch ddefnyddio unrhyw gynnwys at ddibenion masnachol. Os byddwch yn argraffu, copïo neu lawrlwytho’r cynnwys, mae Nesta yn rhoi trwydded ddi-eithriad, ddi-dâl i chi ddefnyddio ei logo mewn perthynas â’r cynnwys a rhaid ichi bob amser gydnabod Nesta fel y crëwr. Rydych chi’n gyfrifol am unrhyw ddifrod i’ch system gyfrifiadurol o ganlyniad i lawrlwytho unrhyw gynnwys.</p>
        <p>Ni chewch ddefnyddio’r wefan hon:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>i bostio, rhannu neu drosglwyddo deunydd anghyfreithlon neu sy’n torri hawliau unrhyw un arall</li>
          <li>at unrhyw ddiben masnachol</li>
          <li>mewn unrhyw ffordd sy’n sarhaus, enllibus neu anweddus neu sy’n aflonyddu neu’n poeni unrhyw un neu’n cyfyngu ar eu defnydd a’u mwynhad o’r wefan neu sy’n niweidio ein henw da</li>
          <li>i drosglwyddo firysau meddalwedd neu god a gynlluniwyd i dorri, dinistrio neu beryglu uniondeb meddalwedd, caledwedd neu offer telathrebu</li>
        </ul>
        <p>Wrth ddefnyddio’r wefan hon, rhaid ichi ddilyn y rheolau canlynol:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>ymddwyn yn gyfreithlon, yn foesegol ac yn onest ac yn cydymffurfio â’r Telerau hyn</li>
          <li>ymddwyn yn synhwyrol, yn onest ac â pharch at eraill</li>
          <li>peidio â dweud celwydd, camliwio rhywun neu rywbeth, nac esgus bod rhywun arall</li>
          <li>bod yn gwrtais ac yn barchus wrth gyfathrebu neu ryngweithio ag eraill.</li>
        </ul>
        <p class="mb-4">I’r graddau y caniateir gan y gyfraith, rydych yn rhyddhau, yn amddiffyn (yn ôl dewis Nesta), yn indemnio, ac yn cadw Nesta’n ddieuog rhag unrhyw hawliadau, atebolrwydd, difrod, colledion ac eitemau treuliau, gan gynnwys ffioedd cyfreithiol a phroffesiynol rhesymol, sy’n codi o neu mewn unrhyw ffordd yn gysylltiedig â: (a) eich tor o’r Telerau hyn, neu (b) eich defnydd amhriodol o’r llwyfan. Dim ond os a i’r graddau y bydd hawliadau, colledion ac ati wedi’u hachosi gan eich tor o’r Telerau y bydd yr indemniad hwn yn berthnasol.</p>
        <p class="mb-4">Gall y wybodaeth ar y wefan newid o bryd i’w gilydd ac ni allwn warantu y bydd bob amser yn gywir ac yn gyfredol. Nid ydym yn gyfrifol am gynnwys safleoedd allanol rydych yn eu cyrchu o’r wefan hon. Ni allwn warantu y bydd y wefan ar gael bob amser nac yn rhydd o wallau neu firysau. Eich cyfrifoldeb chi yw gosod meddalwedd wirio firysau i ddiogelu’ch caledwedd.</p>
        <p class="mb-4">Gall y Telerau hyn newid o bryd i’w gilydd. Os ydych yn defnyddio’r wefan ar ôl i newid gael ei wneud, byddwch yn cael eich ystyried fel un sydd wedi derbyn y newid. Gall telerau ychwanegol fod yn berthnasol i rai rhannau o’r wefan, megis ceisiadau am arian grant neu daliad am ddigwyddiadau.</p>
        <p class="mb-4">Mae’r Telerau hyn yn cael eu llywodraethu gan gyfraith Lloegr a bydd llysoedd Lloegr a Chymru yn meddu ar awdurdodaeth dros unrhyw anghydfod.</p>
        <p>Nesta, cwmni cyfyngedig drwy warant wedi’i gofrestru yn Lloegr a Chymru gyda rhif cwmni 7706036 a rhif elusen 1144091.<br>Wedi’i gofrestru fel elusen yn yr Alban gyda rhif SC042833.<br>Swyddfa gofrestredig: 58 Victoria Embankment, Llundain, EC4Y 0DS</p>
    cookie_policy:
      title: "Cookie policy"
      page_title: "Cookie policy"
      body: |
        <h2>About cookies</h2>
        <p class="mb-2">
          Cookies are small text files that are placed on your computer by the websites you visit. Cookies allow us to identify you (or, more accurately, your computer) when you visit our website. Knowing how often people are visiting each page of our website helps us work out how and where to improve our website.
        </p>
        <p class="mb-2">
          Our website uses a mix of necessary and non-essential (performance and marketing) cookies. While the essential cookies are needed to make the site function properly, you can set your preferences for the non-essential cookies by using our cookie preferences tool. This will appear automatically the first time you visit our site or if you open up our site in a private web browser. You can also find it at any point by clicking the icon in the bottom left of the screen.
        </p>
        <p class="mb-6">
          <strong>This cookie policy is part of our <a href="/privacy-policy" class="link">Privacy Policy.</a></strong>
        </p>
        <h2>Types of cookie</h2>
        <p class="mb-2">
          There are different categories of cookies:
        </p>
        <p class="mb-2">
          <strong>Necessary</strong> cookies help make our website usable by enabling basic functions like page navigation and access to secure areas of the website. The website cannot function properly without these cookies and you cannot disable these cookies through the preference settings on our site. You can disable these by changing your browser settings, though this will result in some parts of our website not working.
        </p>
        <p class="mb-2">
          <strong>Functional</strong> cookies enable us to enhance the functionality of our website, for example by providing you with a more personalised experience based on previous preferences you may have selected or your previous visits. You can disable these cookies through the preference settings on our site or your browser settings however this may result in some parts of the website not working properly.
        </p>
        <p class="mb-2">
          <strong>Performance or analytics</strong> cookies help us understand how visitors interact with our websites by collecting and reporting information anonymously. They help us to improve the performance of our website. These cookies will not be enabled unless you have consented to this.
        </p>
        <p class="mb-6">
          <strong>Marketing</strong> cookies are used to track visitors across websites. The intention is to display content and ads that are relevant and engaging for the individual user and therefore more valuable. These cookies will not be enabled unless you have consented to this.
        </p>
        <h2>Persistent cookies and session cookies</h2>
        <p class="mb-2">
          <strong>Persistent</strong> cookies remain on a visitor’s device for a set amount of time. This means for example that we can identify when a site visitor is a repeat visitor or new to us.
        </p>
        <p class="mb-6">
          <strong>Session</strong> cookies are created temporarily and last for as long as your browser window is open, being automatically deleted after you close your browser. These allow us to link the actions of a user during a visit to the website, to provide a consistent experience.
        </p>
        <h2>First party cookies and third-party cookies</h2>
        <p class="mb-2">
          <strong>First-party cookies</strong> are set directly by our website.
        </p>
        <p class="mb-6">
          <strong>Third-party cookies</strong> are set by another website, usually because we have incorporated elements from those other sites into our site (for example videos or social media plugins).
        </p>
        <h2>The cookies we use</h2>
        <p class="mb-2">
          Details about the cookies we use are set out below. Some of these are third-party cookies.
        </p>
        <p class="mb-2">
          <strong>CookieControl</strong> This cookie records a user's preferences for analytics and marketing cookies and remembers if you have set your cookie preferences on our site.
        </p>
        <p class="mb-6">
          __cfduid Used by Cloudflare to identify individual clients behind a shared IP address and apply security settings on a per-client basis. It expires in 1 year.
        </p>
        <h2>Google analytics cookies</h2>
        <p class="mb-2">
          <strong>gtag.js</strong> This cookie is used to identify unique users and sessions. It contains a randomly generated identifier that is used to calculate visitor, session, and campaign data.
        </p>
        <p class="mb-2">
          <strong>analytics.js</strong>. These cookies are used for tracking user interactions on the website.
        </p>
        <p class="mb-2">
          <strong>_ga</strong> This cookie helps us monitor the use and performance of our website. It expires in 2 years.
        </p>
        <p class="mb-2">
          <strong>_gid</strong> This cookie helps us monitor the use and performance of our website. It expires in 24 hours.
        </p>
        <p class="mb-2">
          The <strong>_utma</strong> cookie stores the number of visits made from the users’ device, the time of the first visit, the previous visit and the current visit.
        </p>
        <p class="mb-6">
          The <strong>_utmb</strong> cookie helps us track how long a user stays on our site. This cookie does not contain any personal information other than the IP address of your device.
        </p>
