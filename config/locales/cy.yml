    surveys:
      thank_you:
        page_title: "Diolch!"
        title: "Diolch!"
        subtitle: Bydd eich atebion yn ein helpu i wneud y gwasanaeth hwn yn well i deuluoedd ym mhobman. Gobeithiwn y byddwch yn mwynhau’r fideos ac yn cael hyd i syniadau defnyddiol a all wneud gwahaniaeth go iawn i chi a’ch teulu.
    thank_you: 
      page_title: "Diolch am gofrestru!"
      title: Rydych chi wedi cofrestru, llongyfarchiadau!
      title_waitlist: Rwyt ti wedi cael dy ychwanegu at ein rhestr aros!
      subtitle: Bob wythnos, byddwn ni’n anfon neges destun atoch. Y cyfan sydd angen i chi ei wneud yw gwylio’r fideo a rhoi cynnig ar y gweithgaredd.
      para_1: "Oes gyda chi 2 funud? Helpwch ni i lunio’r gwasanaeth o amgylch eich anghenion. Mae gennym 12 cwestiwn byr i chi. Rhowch eich barn, ac i ddiolch i chi, cewch gyfle i ennill taleb gwerth £50!<br> <a href='{{survey_url}}' class='btn bg-white text-black mt-6'>Cymerwch ran yn yr arolwg</a>"
      para_2: Os ydych chi’n chwilio am gymorth gyda’ch iechyd chi neu iechyd eich plentyn, cyllid eich teulu, neu os oes gennych bryderon am ddatblygiad eich plentyn, ewch i’n <a href='/resources' class='link'>resources page</a> i weld pa gymorth sydd ar gael yn y DU.
    terms:
      page_title: "Telerau Defnyddio"
      title: "Telerau Defnyddio"
      body: |
        <p class="mb-4">Pwrpas y wefan hon yw galluogi rhieni a gofalwyr plant 3–24 mis oed i gofrestru ar gyfer rhaglen negeseuon testun sy’n darparu awgrymiadau a chyngor ar themâu sy’n ymwneud â datblygiad plant.</p>
        <p class="mb-4"><a href='https://www.nesta.org.uk/' target='_blank' class='link'>Nesta</a> sy’n berchen ar y wefan hon ac yn ei gweithredu – mae ein manylion llawn isod. Mae defnyddio’r wefan hon yn ddarostyngedig i’r Telerau hyn. Mae ein <a href='/privacy_policy' class='link'>Hysbysiad Preifatrwydd</a> yn esbonio sut rydym yn defnyddio unrhyw wybodaeth bersonol y gallwn ei chasglu drwy’r wefan. Os nad ydych yn cytuno â’r Telerau hyn neu â’n Polisi Preifatrwydd, peidiwch â defnyddio’r wefan hon.</p>
        <p class="mb-4">Mae’r wybodaeth, y deunyddiau a’r logos ar y wefan hon yn perthyn i Nesta, ein partneriaid neu ein trwyddedwyr. Nid ydym yn rhoi unrhyw ddatganiad na gwarant ynghylch y cynnwys, gan gynnwys mewn perthynas ag unrhyw dorri hawliau eiddo deallusol.</p>
        <p class="mb-4">Pwrpas cynnwys y wefan a’r negeseuon testun yw darparu gwybodaeth yn unig, ac ni fydd Nesta yn atebol am unrhyw benderfyniadau a wnewch o ganlyniad i edrych ar y cynnwys. Ni all Nesta eich digolledu am unrhyw golled y gallech ei dioddef o ganlyniad i’r canlynol:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>unrhyw gamau a gymerwch ar sail unrhyw beth rydych wedi’i ddarllen ar y tudalennau hyn;</li>
          <li>unrhyw gamgymeriad yng nghynnwys ein gwefan;</li>
          <li>unrhyw ran o’n gwefan nad yw ar gael neu nad oes modd cael mynediad ati;</li>
          <li>eich defnydd o wefan unrhyw sefydliad y gallwch ei chyrchu drwy ein gwefan (gan gynnwys unrhyw bryniant gan y sefydliad hwnnw ac unrhyw ddefnydd a wnânt o’r data personol a roddwch iddynt);</li>
          <li>lawrlwytho unrhyw ddeunydd o’n gwefan.</li>
        </ul>
        <p class="mb-4">Ni fydd Nesta yn eithrio unrhyw atebolrwydd a allai fod gennym yn y digwyddiad annhebygol ein bod wedi gweithredu’n dwyllodrus, neu os byddwn yn esgeulus ac, o ganlyniad, yn achosi marwolaeth neu anaf personol mewn cysylltiad â’r wefan hon.</p>
        <p class="mb-4">Caniateir argraffu, copïo neu lawrlwytho unrhyw gynnwys o’r wefan ar yr amod ei fod at ddefnydd preifat a phersonol yn unig. Ni chewch ddefnyddio unrhyw gynnwys at ddiben masnachol. Os byddwch yn argraffu, copïo neu lawrlwytho cynnwys, mae Nesta yn rhoi trwydded anghyfyngedig, ddi-freindal ac anecsgliwsif i chi ddefnyddio ei logo mewn cysylltiad â’r cynnwys hwnnw, a rhaid i chi bob amser gydnabod Nesta fel crëwr y cynnwys. Chi fydd yn gyfrifol am unrhyw ddifrod i’ch system gyfrifiadurol a allai ddeillio o lawrlwytho unrhyw gynnwys, neu am unrhyw niwed arall (ac eithrio fel y nodir fel arall yn y telerau hyn) sy’n codi o’ch defnydd o’r cynnwys.</p>
        <p>Ni chewch ddefnyddio’r wefan hon:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>i bostio, rhannu neu drosglwyddo deunydd sy’n anghyfreithlon neu sy’n torri hawliau unrhyw un arall;</li>
          <li>at unrhyw ddiben masnachol;</li>
          <li>mewn unrhyw ffordd sy’n sarhaus, yn enllibus neu’n anweddus, neu sy’n aflonyddu ar unrhyw un neu’n peri gofid iddynt, neu sy’n cyfyngu ar neu’n atal eu defnydd a’u mwynhad o’r wefan, neu sydd fel arall yn niweidio ein henw da;</li>
          <li>i drosglwyddo feirysau meddalwedd neu god a luniwyd i darfu ar, ddinistrio neu beryglu cyfanrwydd meddalwedd cyfrifiadurol, caledwedd neu offer telathrebu.</li>
        </ul>
        <p>Wrth ddefnyddio’r wefan hon, rhaid i chi ddilyn y rheolau canlynol:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>gweithredu’n gyfreithlon, yn foesegol ac yn ddidwyll, a chydymffurfio â’r Telerau hyn;</li>
          <li>gweithredu gyda synnwyr cyffredin, uniondeb, a thrin eraill â pharch;</li>
          <li>peidio â dweud celwydd, camliwio rhywbeth neu rywun, nac esgus bod yn rhywun arall;</li>
          <li>bod yn gwrtais ac yn barchus wrth gyfathrebu neu ryngweithio ag eraill.</li>
        </ul>
        <p class="mb-4"> I’r graddau a ganiateir gan y gyfraith, byddwch yn rhyddhau Nesta rhag unrhyw hawliadau, rhwymedigaethau, iawndaliadau, colledion a threuliau, yn ei amddiffyn (yn ôl dewis Nesta), ac yn ei ddigolledu mewn perthynas â hwy, gan gynnwys, heb gyfyngiad, ffioedd cyfreithiol a phroffesiynol rhesymol, sy’n codi o neu sydd mewn unrhyw ffordd yn gysylltiedig â: (a) eich torri’r Telerau hyn, neu (b) eich defnydd amhriodol o’r platfform. Bydd y rhwymedigaeth ddigolledu hon yn berthnasol dim ond os, ac i’r graddau y mae, yr hawliadau, rhwymedigaethau, iawndaliadau, colledion a threuliau hynny wedi eu hachosi gan eich methiant i gydymffurfio â’ch rhwymedigaethau o dan y Telerau hyn.</p>
        <p class="mb-4">Gall y wybodaeth ar y wefan hon newid o bryd i’w gilydd, ac ni allwn warantu y bydd bob amser yn gywir nac yn gyfredol. Nid ydym yn gyfrifol am gynnwys gwefannau allanol y gallwch gysylltu â nhw drwy’r wefan hon. Nid ydym yn gwarantu y bydd y wefan bob amser ar gael nac yn rhydd o wallau neu feirysau. Chi sy’n gyfrifol am osod meddalwedd gwrthfeirws i ddiogelu eich caledwedd. Cyn belled ag y bo’n gyfreithlon bosibl, rydym ni a’n partneriaid yn eithrio pob atebolrwydd am unrhyw golled neu ddifrod a ddioddefir o ganlyniad i ddefnyddio neu gyrchu ein gwefan, boed hynny’n uniongyrchol neu’n anuniongyrchol, a sut bynnag y bydd yn codi, gan gynnwys unrhyw golli data neu ddifrod a achosir gan lawrlwytho cynnwys o’n gwefan.</p>
        <p class="mb-4">Gall y Telerau hyn gael eu newid o bryd i’w gilydd. Os byddwch yn defnyddio’r wefan ar ôl gwneud unrhyw newid, ystyrir eich bod wedi derbyn y newid hwnnw. Mae’n bosibl y bydd telerau ychwanegol yn berthnasol i rannau penodol o’r wefan hon, megis ceisiadau am gyllid grant neu daliadau am ddigwyddiadau.</p>
        <p class="mb-4">Cyfraith Lloegr sy’n llywodraethu’r Telerau hyn, a bydd llysoedd Cymru a Lloegr â’r awdurdodaeth i ymdrin ag unrhyw anghydfod sy’n codi ohonynt.</p>
        <p>Nesta, cwmni cyfyngedig drwy warant sydd wedi’i gofrestru yng Nghymru a Lloegr o dan rif cwmni 7706036 a rhif elusen 1144091.<br>Wedi’i gofrestru fel elusen yn yr Alban o dan rif SC042833.<br>Swyddfa gofrestredig: 58 Victoria Embankment, London, EC4Y 0DS</p>
    cookie_policy:
      title: "Polisi cwcis"
      page_title: "Polisi cwcis"
      body: |
        <h2>Ynglŷn â chwcis</h2>
        <p class="mb-2">
          Ffeiliau testun bach yw cwcis sy’n cael eu gosod ar eich cyfrifiadur gan y gwefannau rydych yn ymweld â nhw. Mae cwcis yn ein galluogi i’ch adnabod chi (neu, yn fwy cywir, eich cyfrifiadur) pan fyddwch yn ymweld â’n gwefan. Mae gwybod pa mor aml mae pobl yn ymweld â phob tudalen ar ein gwefan yn ein helpu i weld sut a ble i wella’r wefan.
        </p>
        <p class="mb-2">
          Mae ein gwefan yn defnyddio cymysgedd o gwcis hanfodol a chwcis nad ydynt yn hanfodol (cwcis perfformiad a marchnata). Er bod y cwcis hanfodol yn angenrheidiol i’r wefan weithio’n iawn, gallwch osod eich dewisiadau ar gyfer y cwcis nad ydynt yn hanfodol drwy ddefnyddio ein hofferyn dewisiadau cwcis. Bydd hwn yn ymddangos yn awtomatig y tro cyntaf y byddwch yn ymweld â’n gwefan, neu os byddwch yn agor ein gwefan mewn porwr preifat. Gallwch hefyd ddod o hyd iddo unrhyw bryd drwy glicio ar yr eicon yng nghornel chwith isaf y sgrin.
        </p>
        <p class="mb-6">
          <strong>Mae’r polisi cwcis hwn yn rhan o’n <a href="/privacy-policy" class="link">Polisi Preifatrwydd</a>.</strong>
        </p>
        <h2>Mathau o gwcis</h2>
        <p class="mb-2">
          Mae gwahanol gategorïau o gwcis:
        </p>
        <p class="mb-2">
          <strong>Cwcis hanfodol:</strong> Mae cwcis hanfodol yn helpu i wneud ein gwefan yn ddefnyddiadwy drwy alluogi swyddogaethau sylfaenol fel llywio rhwng tudalennau a chael mynediad at rannau diogel o’r wefan. Ni all y wefan weithredu’n iawn heb y cwcis hyn, ac ni allwch eu diffodd drwy’r gosodiadau dewisiadau ar ein gwefan. Gallwch eu diffodd drwy newid gosodiadau eich porwr, ond bydd hyn yn golygu na fydd rhai rhannau o’n gwefan yn gweithio.
        </p>
        <p class="mb-2">
          <strong>Cwcis swyddogaethol:</strong> Mae cwcis swyddogaethol yn ein galluogi i wella ymarferoldeb ein gwefan, er enghraifft drwy roi profiad mwy personol i chi ar sail dewisiadau blaenorol rydych efallai wedi’u gwneud neu ar sail eich ymweliadau blaenorol. Gallwch ddiffodd y cwcis hyn drwy’r gosodiadau dewisiadau ar ein gwefan neu drwy osodiadau eich porwr, ond gallai hyn olygu na fydd rhai rhannau o’r wefan yn gweithio’n iawn.
        </p>
        <p class="mb-2">
          <strong>Cwcis perfformiad neu ddadansoddi:</strong> Mae cwcis perfformiad neu ddadansoddi yn ein helpu i ddeall sut mae ymwelwyr yn rhyngweithio â’n gwefannau drwy gasglu a rhoi gwybod am wybodaeth yn ddienw. Maent yn ein helpu i wella perfformiad ein gwefan. Ni fydd y cwcis hyn yn cael eu galluogi oni bai eich bod wedi rhoi caniatâd i hynny.
        </p>
        <p class="mb-6">
          <strong>Cwcis marchnata:</strong> Defnyddir cwcis marchnata i olrhain ymwelwyr ar draws gwefannau. Y nod yw dangos cynnwys a hysbysebion sy’n berthnasol ac yn ddeniadol i’r defnyddiwr unigol, ac felly’n fwy gwerthfawr. Ni fydd y cwcis hyn yn cael eu galluogi oni bai eich bod wedi rhoi caniatâd i hynny.
        </p>
        <h2>Cwcis parhaol a chwcis sesiwn</h2>
        <p class="mb-2">
          Mae cwcis parhaol yn aros ar ddyfais ymwelydd am gyfnod penodol o amser. Mae hyn yn golygu, er enghraifft, y gallwn adnabod a yw ymwelydd â’r wefan yn ymwelydd sy’n dychwelyd neu’n rhywun newydd i ni.
        </p>
        <p class="mb-6">
          Mae cwcis sesiwn yn cael eu creu dros dro ac yn para cyhyd ag y mae ffenestr eich porwr ar agor. Maent yn cael eu dileu’n awtomatig ar ôl i chi gau eich porwr. Mae’r rhain yn ein galluogi i gysylltu gweithredoedd defnyddiwr yn ystod ymweliad â’r wefan, er mwyn darparu profiad cyson.
        </p>
        <h2>Cwcis parti cyntaf a chwcis trydydd parti</h2>
        <p class="mb-2">
          Mae cwcis parti cyntaf yn cael eu gosod yn uniongyrchol gan ein gwefan.
        </p>
        <p class="mb-6">
          Mae cwcis trydydd parti yn cael eu gosod gan wefan arall, fel arfer am ein bod wedi cynnwys elfennau o’r gwefannau hynny ar ein gwefan (er enghraifft fideos neu ategion cyfryngau cymdeithasol).
        </p>
        <p class="mb-6">
          Mae cwci cod picsel yn olrhain gweithredoedd defnyddwyr ar ein tudalennau gwe, megis ymweld â thudalen neu glicio botwm. Yna mae’n anfon yr wybodaeth hon at ein llwyfannau hysbysebu (Meta, TikTok a Reddit) i’n helpu i ddeall beth mae ein hymwelwyr yn ei wneud. Defnyddir y data i fesur canlyniadau, ar gyfer ail-dargedu ac ar gyfer creu cynulleidfaoedd pwrpasol.
        </p>
        <h2>Y cwcis rydym yn eu defnyddio</h2>
        <p class="mb-2">
          Mae manylion y cwcis rydym yn eu defnyddio wedi’u nodi isod. Mae rhai o’r rhain yn gwcis trydydd parti.
        </p>
        <p class="mb-2">
          Mae’r cwcis canlynol yn gwcis hanfodol:<br>
          <strong>_afs_tiny_happy_people_session</strong> Mae hwn yn gwci swyddogaethol angenrheidiol a ddefnyddir i gadw golwg ar pryd mae defnyddiwr wedi mewngofnodi i’r wefan.
        </p>
        <p class="mb-2">
          <strong>CookieControl</strong> Mae’r cwci hwn yn cofnodi dewisiadau defnyddiwr ar gyfer cwcis dadansoddi a marchnata, ac yn cofio a ydych wedi gosod eich dewisiadau cwcis ar ein gwefan.
        </p>
        <h2>Cwcis Google Analytics</h2>
        <p class="mb-2">
          <strong>gtag.js</strong> Defnyddir y cwci hwn i adnabod defnyddwyr a sesiynau unigryw. Mae’n cynnwys dynodwr a gynhyrchir ar hap sy’n cael ei ddefnyddio i gyfrifo data am ymwelwyr, sesiynau ac ymgyrchoedd.
        </p>
        <p class="mb-2">
          <strong>analytics.js</strong> Defnyddir y cwcis hyn i olrhain rhyngweithiadau defnyddwyr ar y wefan.
        </p>
        <p class="mb-2">
          <strong>_ga</strong> Mae’r cwci hwn yn ein helpu i fonitro defnydd a pherfformiad ein gwefan. Mae’n dod i ben ar ôl 2 flynedd.
        </p>
        <p class="mb-2">
          <strong>_gid</strong> Mae’r cwci hwn yn ein helpu i fonitro defnydd a pherfformiad ein gwefan. Mae’n dod i ben ar ôl 24 awr.§
        </p>
        <p class="mb-2">
          Mae’r cwci <strong>_utma</strong> yn storio nifer yr ymweliadau a wnaed o ddyfais y defnyddiwr, amser yr ymweliad cyntaf, yr ymweliad blaenorol a’r ymweliad presennol.
        </p>
        <p class="mb-6">
          Mae’r cwci <strong>_utmb</strong> yn ein helpu i olrhain faint o amser mae defnyddiwr yn aros ar ein gwefan. Nid yw’r cwci hwn yn cynnwys unrhyw wybodaeth bersonol heblaw am gyfeiriad IP eich dyfais.
        </p>
        <h2>Cwcis trydydd parti</h2>
        <p class="mb-2">
          Mae’r wefan hon yn defnyddio cwcis a ddarperir gan sefydliadau eraill i gefnogi swyddogaethau fel dadansoddi perfformiad ystadegol, swyddogaethau cyfryngau cyfoethog a rhannu ar y cyfryngau cymdeithasol. Cwcis trydydd parti yw’r rhain. Gallwch ddarllen polisïau preifatrwydd y trydydd partïon hyn isod:
        </p>
        <ul class="list-disc pl-4 pt-2 mb-6">
          <li>Rydym yn defnyddio Google Analytics ar gyfer dadansoddi perfformiad ystadegol. Mae’r wybodaeth hon yn gyfunol ac felly’n ddienw. <a href='https://policies.google.com/privacy' target='_blank' class='link'>Darllenwch bolisi preifatrwydd Google</a>. I ddewis peidio â chael eich olrhain gan Google Analytics ar wefan Nesta, gallwch ddefnyddio ein hofferyn dewisiadau cwcis. I ddewis peidio â chael eich olrhain gan Google Analytics ar draws pob gwefan, ewch i <a href='http://tools.google.com/dlpage/gaoptout' target='_blank' class='link'>tools.google.com/dlpage/gaoptout</a>.</li>
        </ul>
        <h3 class="text-xl mb-1">Meta (Facebook ac Instagram)</h3>
        <p class="mb-2">Defnyddir y cwcis hyn mewn cysylltiad â Meta Pixel, sy’n ein galluogi i fesur sut mae ein hysbysebion ar Facebook ac Instagram yn perfformio ac i ddangos hysbysebion i bobl sydd wedi ymweld â’n gwefan.</p>
        <p class="mb-2"><strong>_fbp</strong> Wedi’i osod gennym ni. Mae’n storio dynodwr unigryw fel y gall Meta baru’r camau rydych yn eu cymryd ar ein gwefan â hysbysebion y gallech fod wedi’u gweld ar Facebook neu Instagram. Mae’n dod i ben ar ôl 90 diwrnod.</p>
        <h3 class="text-xl mb-1">TikTok</h3>
        <p class="mb-2">Defnyddir y cwcis hyn mewn cysylltiad â TikTok Pixel, sy’n ein galluogi i fesur sut mae ein hysbysebion ar TikTok yn perfformio ac i gyrraedd pobl a allai fod â diddordeb yn yr hyn rydym yn ei gynnig.</p>
        <p class="mb-2"><strong>_ttp</strong> Wedi’i osod gennym ni. Mae’n storio dynodwr unigryw fel y gall TikTok baru’r camau rydych yn eu cymryd ar ein gwefan â hysbysebion y gallech fod wedi’u gweld ar TikTok. Mae’n dod i ben ar ôl 13 mis.</p>
        <p class="mb-2"><strong>_tt_enable_cookie</strong> Wedi’i osod gennym ni. Mae’n cofnodi a yw eich porwr yn caniatáu cwcis TikTok, fel bod TikTok Pixel yn gwybod a yw’n gallu storio dynodwr ar eich dyfais. Mae’n dod i ben ar ôl 13 mis.</p>
        <h3 class="text-xl mb-1">Reddit</h3>
        <p class="mb-2">Defnyddir y cwcis hyn mewn cysylltiad â Reddit Pixel, sy’n ein galluogi i fesur sut mae ein hysbysebion ar Reddit yn perfformio ac i ddangos hysbysebion i bobl sydd wedi ymweld â’n gwefan.</p>
        <p class="mb-2"><strong>_rdt_uuid</strong> Wedi’i osod gennym ni. Mae’n storio dynodwr unigryw fel y gall Reddit baru’r camau rydych yn eu cymryd ar ein gwefan â hysbysebion y gallech fod wedi’u gweld ar Reddit. Mae’n dod i ben ar ôl 3 mis.</p>
        <h2>Rheoli eich gosodiadau cwcis</h2>
        <p class="mb-2">
          Os dymunwch, gallwch rwystro cwcis drwy newid y gosodiadau ar eich porwr – rydym wedi nodi isod ddolenni at dudalennau cymorth rhai o’r prif borwyr sy’n esbonio sut i wneud hynny. Gall rhwystro’r cwcis rydym yn eu defnyddio gael effaith andwyol ar sut mae rhai rhannau neu’r cyfan o’n gwefan yn ymddangos neu’n gweithio. Mae canllawiau cyffredinol ar sut i reoli eich cwcis ar gael yma:
        </p>
        <p class="mb-2">
          <a href="http://www.youronlinechoices.eu/" target="_blank">Eich Dewisiadau Ar-lein</a>
        </p>
        <p class="mb-2">
          Mae canllawiau penodol ar sut i reoli opsiynau cwcis ar gyfer porwyr gwe cyffredin ar gael yma:
        </p>
        <ul class="list-disc pl-4 pt-2 mb-6">
          <li><a href="http://www.google.com/support/chrome/bin/answer.py?hl=en&answer=95647" target="_blank" class="link">Google Chrome</a></li>
          <li><a href="https://support.mozilla.org/en-US/kb/enable-and-disable-cookies-website-preferences" target="_blank" class="link">Mozilla Firefox</a></li>
          <li><a href="https://support.apple.com/en-gb/guide/safari/manage-cookies-and-website-data-sfri11471/mac" target="_blank" class="link">Safari</a></li>
          <li><a href="https://support.microsoft.com/en-gb/help/17442/windows-internet-explorer-delete-manage-cookies" target="_blank" class="link">Internet Explorer</a></li>
          <li><a href="https://privacy.microsoft.com/en-us/windows-10-microsoft-edge-and-privacy" target="_blank" class="link">Microsoft Edge</a></li>
        </ul>
    accessibility:
      title: "Datganiad hygyrchedd ar gyfer CBeebies Parenting"
      page_title: "Datganiad hygyrchedd"
      body: |
        <p class="mb-4">
          Mae’r datganiad hygyrchedd hwn yn berthnasol i CBeebies Parenting <a href="https://www.cbeebies-text.uk" class="link">cbeebies-text.uk</a>.
        </p>
        <p class="mb-4">Nesta sy’n rhedeg y wefan hon. Rydyn ni eisiau i gynifer o bobl â phosibl allu defnyddio’r wefan hon. Er enghraifft, mae hynny’n golygu y dylech allu:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>newid lliwiau, lefelau cyferbyniad a ffontiau</li>
          <li>chwyddo hyd at 300% heb i’r testun redeg oddi ar y sgrin</li>
          <li>defnyddio bysellfwrdd yn unig i symud o gwmpas y rhan fwyaf o’r wefan</li>
          <li>defnyddio meddalwedd adnabod llais i symud o gwmpas y rhan fwyaf o’r wefan</li>
          <li>gwrando ar y rhan fwyaf o’r wefan gan ddefnyddio darllenydd sgrin (gan gynnwys y fersiynau diweddaraf o JAWS, NVDA a VoiceOver)</li>
        </ul>
        <p class="mb-4">Rydyn ni hefyd wedi gwneud testun y wefan mor syml â phosibl i’w ddeall.</p>
        <p class="mb-4">
          Mae gan <a href="https://mcmw.abilitynet.org.uk/" target="_blank" class="link">AbilityNet</a> gyngor ar wneud eich dyfais yn haws i’w defnyddio os oes gennych anabledd.
        </p>
        <h2>Pa mor hygyrch yw’r wefan hon</h2>
        <p class="mb-4">Rydyn ni’n gwybod nad yw rhai rhannau o’r wefan hon yn gwbl hygyrch:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>efallai nad oes dewisiadau testun nac disgrifiadau sain ar gyfer rhywfaint o’r cynnwys fideo</li>
          <li>efallai fod marcio rhai elfennau fideo yn amhriodol, a all beri i gyhoeddiadau annisgwyl ymddangos</li>
        </ul>
        <h2>Adborth a manylion cyswllt</h2>
        <p class="mb-4">Os oes angen gwybodaeth arnat o’r wefan hon mewn fformat gwahanol, fel PDF hygyrch, print bras, fformat hawdd ei ddarllen, recordiad sain neu Braille:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>Anfonwch e-bost at <a href="mailto:info@cbeebies-text.uk" class="link">info@cbeebies-text.uk</a></li>
          <li>Ffoniwch 020 7438 2500</li>
        </ul>
        <p class="mb-4">Byddwn yn ystyried dy gais ac yn cysylltu’n ôl o fewn 5 diwrnod.</p>
        <h2>Rhoi gwybod am broblemau hygyrchedd gyda’r wefan hon</h2>
        <p class="mb-4">Rydyn ni wastad yn ceisio gwella hygyrchedd y wefan hon. Os wyt ti’n dod ar draws unrhyw broblemau nad ydyn nhw wedi’u rhestru ar y dudalen hon, neu os wyt ti’n meddwl nad ydyn ni’n bodloni’r gofynion hygyrchedd, cysyllta â’r tîm drwy anfon e-bost at <a href="mailto:info@cbeebies-text.uk" class="link">info@cbeebies-text.uk</a> neu drwy ffonio 020 7438 2500.</p>
        <h2>Gwybodaeth dechnegol am hygyrchedd y wefan hon</h2>
        <h3>Statws cydymffurfio</h3>
        <p class="mb-4">Mae’r wefan hon yn cydymffurfio’n rhannol â <a href="https://www.w3.org/TR/WCAG22/" target="_blank" class="link">safon AA Canllawiau Hygyrchedd Cynnwys Gwe (WCAG) fersiwn 2.2</a>, oherwydd yr achosion o ddiffyg cydymffurfio a restrir isod.</p>
        <h2>Cynnwys nad yw’n hygyrch</h2>
        <p class="mb-4">Nid yw’r cynnwys a restrir isod yn hygyrch am y rhesymau canlynol.</p>
        <h3>Diffyg cydymffurfio â’r rheoliadau hygyrchedd</h3>
        <p class="mb-4">Nid oes trawsgrifiad testun amgen ar gyfer y fideos. Mae hyn yn methu maen prawf llwyddiant WCAG 2.2 1.2.3 (Disgrifiad Sain neu Ddewis Amgen i Gyfryngau (Wedi’u Recordio ymlaen llaw)).</p>
        <p class="mb-4">Rydyn ni’n bwriadu datrys hyn erbyn: 21 Mai 2027</p>
        <p class="mb-4">Nid oes trac disgrifiad sain ar gynnwys y fideo sy’n disgrifio elfennau gweledol y fideo. Mae hyn yn methu maen prawf llwyddiant WCAG 2.2 1.2.5 (Disgrifiad Sain (Wedi’i Recordio ymlaen llaw)).</p>
        <p class="mb-4">Rydyn ni’n bwriadu datrys hyn erbyn: 21 Mai 2027</p>
        <h2>Paratoi’r datganiad hygyrchedd hwn</h2>
        <p class="mb-4">Paratowyd y datganiad hwn ar 01/05/2026. Cafodd ei adolygu ddiwethaf ar 01/05/2026.</p>
        <p class="mb-4">Cafodd y wefan hon ei phrofi ddiwethaf ar 30/04/2026. Cynhaliwyd y prawf gan Zoonou.</p>
        <p class="mb-4">Defnyddiodd Zoonou <a href="https://www.w3.org/TR/WCAG-EM" target="_blank" class="link">WCAG-EM</a> i ddiffinio’r tudalennau a brofwyd a dull y prawf.</p>
