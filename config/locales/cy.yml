    privacy_policy:
      page_title: Polisi preifatrwydd
      title: Polisi preifatrwydd
      body: |
        <p>Nesta sy’n berchen ar y wefan hon ac yn ei gweithredu - mae ein manylion llawn isod. Mae’r polisi preifatrwydd hwn yn esbonio sut mae Nesta yn defnyddio’r wybodaeth bersonol rydym yn ei chasglu drwy’r wefan hon. Rydym wedi ymrwymo i ddiogelu eich preifatrwydd ac yn cymryd pob rhagofal rhesymol i gadw gwybodaeth bersonol yn ddiogel.</p>
        <h2 class="mt-6">Pa fath o wybodaeth rydym yn ei chasglu?</h2>
        <p class="mb-4"><strong>Manylion cofrestru:</strong> Os byddwch yn cofrestru ar gyfer ein rhaglen negeseuon testun, byddwn yn gofyn am wybodaeth bersonol fel eich enw, rhif ffôn a chod post, yn ogystal â mis a blwyddyn geni eich plentyn. Rydym hefyd yn gofyn am wybodaeth ddewisol i bersonoli eich profiad, fel enw neu lysenw eich plentyn, ac am wybodaeth ddewisol i wella ein gwasanaeth, fel eich diddordebau.</p>
        <p class="mb-4"><strong>Ymchwil:</strong> Efallai y gofynnwn i chi gymryd rhan mewn ymchwil rydym yn ei chynnal, ac efallai y byddwn yn cysylltu â chi i ofyn am ragor o wybodaeth amdanoch chi, neu am eich profiadau neu eich barn.</p>
        <p class="mb-4"><strong>Adborth ac arolygon:</strong> Efallai y gofynnwn i chi hefyd roi adborth neu lenwi arolygon.</p>
        <p class="mb-4"><strong>Gweithgarwch ar-lein:</strong> Pan fyddwch yn defnyddio ein gwefan, rydym yn cael gwybodaeth am y ddyfais rydych wedi’i defnyddio i’w chyrchu, eich ymweliadau a’r ffordd rydych yn defnyddio’r wefan, gan gynnwys math a fersiwn eich porwr, y ffynhonnell gyfeirio a’ch gweithgarwch. Rydym yn casglu’r wybodaeth hon drwy offer dadansoddi parti cyntaf sydd wedi’u hymgorffori yn ein gwefan, heb ddefnyddio cwcis na thechnolegau olrhain trydydd parti.</p>
        <h2 class="mt-6">Beth rydym yn ei wneud gyda’r wybodaeth rydym yn ei chasglu, a beth yw ein sail gyfreithiol dros wneud hynny?</h2>
        <p class="mb-4"><strong>Manylion cofrestru:</strong> Os byddwch yn cofrestru ar gyfer ein rhaglen negeseuon testun, byddwn yn defnyddio’ch gwybodaeth bersonol i anfon negeseuon testun atoch. Ein sail gyfreithiol dros wneud hyn yw cyflawni contract er mwyn darparu’r gwasanaeth negeseuon testun i chi a’ch plentyn, a’n buddiant cyfreithlon wrth werthuso’r rhaglen.</p>
        <p class="mb-4"><strong>Proseswyr trydydd parti:</strong> Rydym yn defnyddio prosesydd trydydd parti o’r enw Twilio i ddarparu negeseuon testun. Wrth ddefnyddio’r trydydd parti hwn, rydym yn dilyn ein buddiant cyfreithlon i ddefnyddio technoleg trydydd parti er mwyn sicrhau mwy o effeithlonrwydd o fewn ein sefydliad. Er mwyn cydbwyso ein buddiannau ni yn erbyn eich buddiannau chi, rydym yn gwneud trefniadau contractiol sy’n rhwymol yn gyfreithiol gyda Twilio, ac yn cymryd camau i sicrhau ei fod yn cynnal mesurau technegol a threfniadol priodol i gadw eich gwybodaeth bersonol yn ddiogel. I gael rhagor o wybodaeth, gweler <a href='https://www.twilio.com/en-us/privacy' target='_blank' class='link'>polisi preifatrwydd Twilio</a>.</p>
        <p class="mb-4"><strong>Ymchwil:</strong> Os byddwch yn cytuno i gymryd rhan mewn unrhyw ymchwil, byddwn yn defnyddio’ch gwybodaeth at ddiben y prosiect neu’r rhaglen ymchwil honno. Rhoddir manylion llawn i chi ynghylch sut y caiff eich gwybodaeth bersonol ei defnyddio ar yr adeg y byddwch yn cytuno i gymryd rhan; gallai hyn gynnwys llywio datblygiad gwobr, prosiect, rhaglen neu fenter newydd, cael ei chynnwys mewn adroddiadau neu ganlyniadau ymchwil eraill, a gall gynnwys ei harddangos yn gyhoeddus ar dudalennau gwe sy’n ymwneud â’r prosiect neu’r rhaglen ymchwil benodol.</p>
        <p class="mb-4"><strong>Adborth ac arolygon:</strong> Os byddwch yn cytuno i roi adborth neu lenwi arolwg, byddwn yn defnyddio’r wybodaeth i wella ein gwaith a’n gweithgareddau.</p>
        <p class="mb-4"><strong>Ar gyfer pob math o wybodaeth a gesglir:</strong> Gwnewch yn siŵr bod yr holl fanylion personol a roddwch i ni yn gywir ac yn gyfredol, a rhowch wybod i ni am unrhyw newidiadau. Sicrhewch eich bod yn cael caniatâd yn gyntaf cyn rhoi gwybodaeth unrhyw un arall i ni.</p>
        <p class="mb-4">Mae natur gwaith Nesta yn golygu ein bod yn aml yn gweithio mewn partneriaeth â sefydliadau eraill. Fodd bynnag, ni fyddwn yn rhannu eich gwybodaeth ag unrhyw sefydliad arall oni bai bod gennym eich caniatâd yn gyntaf, neu fod gennym fuddiant cyfreithlon neu ofyniad cyfreithiol i wneud hynny.</p>
        <p class="mb-4">Efallai y byddwn hefyd yn defnyddio’ch gwybodaeth i gynnal dadansoddi ac ymchwil i wella ein cyhoeddiadau, digwyddiadau a gweithgareddau, i addasu ein gwefan a’i chynnwys i weddu i’ch dewisiadau penodol, i’ch hysbysu am unrhyw newidiadau i’n gwefan neu i’n gweithgareddau a allai effeithio arnoch, i atal a chanfod twyll a chamddefnydd, ac i ddiogelu defnyddwyr eraill.<p>
        <p class="mb-4">Pa bynnag ffordd y byddwch yn dewis ymgysylltu â Nesta, efallai y byddwn yn cadw eich gwybodaeth at ddibenion ein buddiannau busnes cyfreithlon ein hunain, ar gyfer dadansoddi ystadegol, er mwyn adolygu, datblygu a gwella ein gweithgareddau busnes. Yn y sefyllfa hon, dim ond os bydd angen gwneud hynny y byddwn yn cadw unrhyw wybodaeth bersonol, a byddwn bob amser yn rhoi mesurau diogelwch technegol a gweinyddol priodol ar waith, gan gynnwys, lle bo modd, gwneud y wybodaeth bersonol a gedwir yn ddienw neu ei lleihau.</p>
        <p>Rydym yn defnyddio trydydd parti i ddarparu gwasanaeth diogelwch data yn y cwmwl, storio ac adfer ar ôl trychineb, er mwyn gwneud copïau wrth gefn o’r data rydym yn ei gadw.</p>
        <h2 class="mt-6">Am ba hyd y byddwn yn cadw eich gwybodaeth?</h2>
        <p class="mb-4"><strong>Egwyddor gyffredinol:</strong> Dim ond cyhyd ag y bo angen i gyflawni’r diben y rhoddwyd y wybodaeth i ni y byddwn yn cadw unrhyw wybodaeth bersonol a roddwch i ni. Byddwn yn dileu gwybodaeth yn ddiogel pan na fydd ei hangen mwyach at y diben hwnnw, fel yr esbonnir yn fanylach isod.</p>
        <p class="mb-4"><strong>Gwerthuso’r rhaglen negeseuon testun:</strong> Os byddwch yn cymryd rhan yn y rhaglen negeseuon testun, bydd eich data personol yn cael ei gadw am hyd y rhaglen ac am gyfnod o dair blynedd wedyn at ddibenion gwerthuso llwyddiant y rhaglen beilot hon ac i ganiatáu i dîm y prosiect ddefnyddio’r canfyddiadau i lywio unrhyw fersiynau yn y dyfodol.</p>
        <p class="mb-4"><strong>Ymchwil:</strong> Os byddwch yn cytuno i gymryd rhan mewn unrhyw ymchwil, bydd eich gwybodaeth bersonol yn cael ei chadw cyhyd ag y bo ganddi werth i Nesta ac i’r gymuned ymchwil ehangach, ac am gyhyd ag y gall unrhyw gyllidwr ymchwil allanol, cyfraith patentau, gofynion deddfwriaethol neu ofynion rheoleiddiol eraill ei bennu. Caiff data ymchwil ei adolygu o leiaf bob 5 mlynedd er mwyn ystyried ei werth parhaus i Nesta, a chaiff data personol ei wneud yn ddienw neu ei ffugenwi lle bo modd, oni bai y byddai gwneud hynny’n effeithio ar gyfanrwydd y data ymchwil a/neu ei ganlyniadau, neu ar ei werth yn y dyfodol. I’r graddau y mae Data Personol sy’n deillio o unrhyw ymchwil wedi’i gynnwys mewn adroddiad ymchwil neu ganlyniad ymchwil arall, bydd yn cael ei gadw am byth fel rhan o’r deunyddiau a gyhoeddir. Bydd ymchwil sy’n cefnogi datblygiad gwobr, prosiect, rhaglen, cyhoeddiad neu ganlyniad ymchwil arall yn cael ei chadw am o leiaf 5 mlynedd ar ôl cyhoeddi neu ar ôl cwblhau unrhyw ganlyniad ymchwil arall. Os yw’r ymchwil yn cael ei hariannu neu’n destun unrhyw gontract arall, efallai y bydd eich data personol yn cael ei gadw am 6 blynedd ar ôl diwedd y contract, neu’n hwy os yw’r contract neu’r cytundeb ariannu yn nodi hynny, a gallai hyn fod hyd at 12 mlynedd ar ôl i’r contract ddod i ben.</p>
        <p class="mb-4"><strong>Prosesu at ddibenion dadansoddi ystadegol:</strong> Dim ond tra byddwn yn cadw eich gwybodaeth bersonol yn unol â’r egwyddorion a eglurir uchod y bydd y math hwn o brosesu yn digwydd.</p>
        <h2 class="mt-6">Cwcis</h2>
        <p class="mb-4">Mae’r wefan hon yn defnyddio cwcis. Ffeiliau testun bach yw cwcis sy’n cael eu gosod ar eich cyfrifiadur gan y gwefannau rydych yn ymweld â nhw. Maent yn cael eu defnyddio’n helaeth i wneud i wefannau weithio, neu i weithio’n fwy effeithlon, yn ogystal â darparu gwybodaeth ddefnyddiol i berchnogion gwefannau. Mae’r rhan fwyaf o borwyr gwe yn caniatáu rhywfaint o reolaeth dros y rhan fwyaf o gwcis drwy osodiadau’r porwr.</p>
        <p class="mb-4">Mae’r wefan hon yn defnyddio amrywiaeth o fathau o gwcis. Mae rhai ohonynt yn gwbl angenrheidiol i’ch galluogi i symud o gwmpas y wefan neu i ddarparu rhai nodweddion sylfaenol, megis mewngofnodi i feysydd diogel.</p>
        <p class="mb-4">Mae’r wefan hefyd yn defnyddio cwcis perfformiad sy’n casglu gwybodaeth am y ffordd rydych yn defnyddio’r wefan, megis sut y cyrhaeddoch chi hi a faint o amser rydych yn ei dreulio ar dudalennau penodol. Mae’r wybodaeth hon yn cael ei chrynhoi ac felly’n ddienw, ac fe’i defnyddir i wella perfformiad y wefan. Os dymunwch, gallwch optio allan o’r cwcis hyn drwy ddefnyddio ein hofferyn dewisiadau cwcis. Nodwch efallai na fydd rhai o nodweddion y wefan yn gweithio os byddwch yn dewis blocio cwcis. I gael rhagor o wybodaeth am gwcis, gweler ein Polisi Cwcis.</p>
        <p class="mb-4">Rydym hefyd yn defnyddio cwcis olrhain trydydd parti at ddibenion ail-farchnata, gan gynnwys Google Adwords. Mae’r trydydd partïon hyn yn ein helpu i anfon hysbysebion wedi’u teilwra atoch am Nesta, a allai fod o ddiddordeb i chi, yn seiliedig ar ba rannau o wefannau Nesta rydych wedi’u gweld. Bydd yr hysbysebion yn cael eu dangos i chi ar dudalennau canlyniadau chwilio eraill, neu ar safleoedd o fewn rhwydwaith arddangos Google neu unrhyw drydydd parti arall. Nid ydym yn casglu unrhyw wybodaeth adnabodadwy drwy ddefnyddio’r gwasanaethau ail-farchnata trydydd parti hyn.</p>
        <p class="mb-4">Os nad ydych yn dymuno derbyn hysbysebion o’r fath, gallwch addasu eich dewisiadau drwy ddefnyddio ein hofferyn dewisiadau cwcis. I gael rhagor o wybodaeth am sut mae Google yn defnyddio cwcis hysbysebu, ac i reoli eich gosodiadau a dewis peidio â defnyddio’r nodweddion hyn, gweler <a href='https://support.google.com/analytics/answer/6004245?hl=en' target='blank' class='link'>gwefan gymorth Google</a>.</p>
        <h2 class="mt-6">Diogelwch</h2>
        <p class="mb-4">Rydym yn cymryd camau i ddiogelu eich gwybodaeth bersonol ac yn dilyn gweithdrefnau sydd wedi’u cynllunio i leihau mynediad anawdurdodedig at eich gwybodaeth neu ei datgelu.</p>
        <p class="mb-4">Os byddwch, wrth ddefnyddio ein gwefan(neu gwefannau), yn dod yn ymwybodol o unrhyw wendidau posibl, rhowch wybod i ni. Gweler ein <a href='https://www.nesta.org.uk/vulnerability-disclosure-policy/' target='_blank' class='link'>polisi datgelu gwendidau</a> am ganllawiau ar sut i roi gwybod am wendid.</p>
        <h2 class="mt-6">Cysylltu â ni, arfer eich hawliau a chwynion</h2>
        <p>Mae gennych hawl gyfreithiol i wybod pa wybodaeth bersonol rydym yn ei chadw amdanoch a sut mae’r wybodaeth honno’n cael ei phrosesu. Mae hyn yn cynnwys yr hawl i:</p>
        <ul class='list-disc pl-4 pt-2 mb-4'>
          <li>ofyn i ni gywiro unrhyw gamgymeriadau yn eich gwybodaeth sydd gennym</li>
          <li>ofyn i ni ddileu eich gwybodaeth bersonol</li>
          <li>ofyn i ni roi’r gorau i ddefnyddio eich gwybodaeth bersonol, neu gyfyngu ar y ffordd y gallwn ei defnyddio, er enghraifft os ydych yn teimlo ei bod yn anghywir neu nad oes angen i Nesta ei defnyddio mwyach</li>
          <li>gwrthwynebu i ni ddefnyddio eich gwybodaeth bersonol</li>
          <li>gwrthwynebu unrhyw benderfyniadau awtomataidd y gallem eu gwneud gan ddefnyddio eich gwybodaeth bersonol</li>
        </ul>
        <p class="mb-4">Os hoffech wybod pa wybodaeth sydd gennym amdanoch, neu os hoffech arfer unrhyw un o’ch hawliau eraill fel y nodir uchod, neu os oes gennych unrhyw gŵyn am y ffordd rydym yn defnyddio’ch gwybodaeth bersonol, anfonwch e-bost atom at information@nesta.org.uk neu ysgrifennwch atom yn 58 Victoria Embankment London EC4Y 0DS UK, gan roi digon o wybodaeth i’ch adnabod (e.e. enw a chyfeiriad neu unrhyw fanylion cofrestru).</p>
        <p class="mb-4">Os yw ein gwybodaeth yn anghywir neu wedi dyddio, rhowch ddigon o wybodaeth i ni fel y gallwn ei diweddaru. Os ydych am i ni ddileu, cyfyngu neu roi’r gorau i ddefnyddio unrhyw wybodaeth sydd gennym amdanoch, cadarnhewch yn benodol y rhesymau dros ofyn am hyn. Os ydych yn anhapus gyda’r ffordd rydym yn defnyddio’ch gwybodaeth, esboniwch y rhesymau i ni a byddwn yn ymchwilio i’r mater.</p>
        <p class="mb-4">Gallwch hefyd ysgrifennu at yr un cyfeiriad os oes gennych gŵyn am y polisi hwn.</p>
        <p>Os ydych yn anhapus gyda’r ffordd y cafodd unrhyw gais hawliau data neu gŵyn ei thrin, mae gennych hawl i gwyno wrth y Comisiynydd Gwybodaeth:</p>
        <ul class='list-disc pl-4 pt-2 mb-4'>
          <li><a href='https://ico.org.uk/concerns' target='_blank' class='link'>Ar wefan yr ICO</a>;</li>
          <li>Drwy’r post at Wycliff House, Water Lane, Wilmslow, Cheshire SK9 5AF, neu</li>
          <li>Drwy ffonio’r llinell gymorth ar 0303 123 1113.</li>
        </ul>
        <p>Mae’r manylion cyswllt hyn ar gyfer Swyddfa’r Comisiynydd Gwybodaeth yn gywir ar adeg cyhoeddi’r polisi preifatrwydd hwn.</p>
        <h2 class="mt-6">Newidiadau i’r polisi preifatrwydd</h2>
        <p class="mb-4">Efallai y byddwn yn newid y polisi preifatrwydd hwn o bryd i’w gilydd. Byddwn yn eich hysbysu am unrhyw newidiadau sy’n ymwneud â gwybodaeth sydd gennym amdanoch eisoes, lle bo hynny’n ymarferol. Dylech wirio’r polisi hwn o bryd i’w gilydd i sicrhau eich bod yn ymwybodol o’r fersiwn ddiweddaraf a fydd yn berthnasol bob tro y byddwch yn defnyddio’r wefan hon.</p>
        <p>Nesta, cwmni cyfyngedig drwy warant sydd wedi’i gofrestru yng Nghymru a Lloegr gyda rhif cwmni 7706036 a rhif elusen 1144091.<br>Wedi’i gofrestru fel elusen yn yr Alban gyda rhif SC042833.<br>Swyddfa gofrestredig: 58 Victoria Embankment, London, EC4Y 0DS<br>E-bost: <a href='mailto:information@nesta.org.uk' class='link'>information@nesta.org.uk</a></p>
    resources:
      page_title: Adnoddau i ofalwyr
      title: Adnoddau i chi a’ch plentyn bach
      text: Rydym wedi casglu rhestr o adnoddau defnyddiol isod i’ch helpu os ydych yn wynebu heriau wrth ofalu am eich plentyn bach.
      welsh_resources: Gweld yr adnoddau sydd ar gael yng Nghymru
      english_resources: Adnoddau sydd ar gael yn Lloegr
      england:
        body: |
          <div class="bg-white p-5 md:p-10" x-data="{ showMentalHealth: false, showSpeechLanguage: false, showFinancialSupport: false, showChildDevelopment: false }">
            <h2 class="text-3xl mb-10">Resources available in England</h2>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showMentalHealth = !showMentalHealth" @keyup.enter="showMentalHealth = !showMentalHealth" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Cymorth iechyd meddwl i rieni a phlant
                <span x-show="!showMentalHealth" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showMentalHealth" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <ul x-show="showMentalHealth" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Cymorth iechyd meddwl y GIG:</span> Cewch gyngor am anawsterau iechyd meddwl a <a href=’https://www.nhs.uk/mental-health/’ target=’_blank’ class=’link’>dewch o hyd i gymorth lleol.</a></li>
                <li class="mb-4"><span class=’font-bold’>Gwasanaethau iechyd meddwl lleol:</span> <a href=’https://www.nhs.uk/nhs-services/gps/’ target=’_blank’ class=’link’>Cysylltwch â’ch meddyg teulu</a> i holi am atgyfeiriad</li>
                <li class="mb-4"><span class=’font-bold’>Mind:</span> Ffoniwch 0300 123 3393 neu <a href=’https://www.mind.org.uk/’ target=’_blank’ class=’link’>ewch ar-lein</a> i gael gwybodaeth, cyngor a chymorth ar gyfer eich anghenion iechyd meddwl chi neu rywun agos atoch, gan gynnwys cymorth hunangymorth gyda chefnogaeth i oedolion sy’n byw yn Lloegr ac Ynysoedd y Sianel</li>
                <li><span class=’font-bold’>Anna Freud:</span> Ffoniwch 020 7794 2313 neu <a href=’https://www.annafreud.org/resources/family-wellbeing/’ target=’_blank’ class=’link’>ewch ar-lein</a> i weld adnoddau i helpu plentyn sy’n profi anawsterau iechyd meddwl</li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showSpeechLanguage = !showSpeechLanguage" @keyup.enter="showSpeechLanguage = !showSpeechLanguage" class="flex items-center text-xl gap-4 font-semibold cursor-pointer" tabindex=0>
                Anawsterau lleferydd, iaith a chyfathrebu
                <span x-show="!showSpeechLanguage" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showSpeechLanguage" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <ul x-show="showSpeechLanguage" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Therapi lleferydd ac iaith lleol:</span> Gallwch gael atgyfeiriad at wasanaeth therapi lleferydd ac iaith drwy eich meddyg teulu, ymwelydd iechyd, nyrs ardal, staff meithrin, athro neu athrawes eich plentyn, canolfan blant, pediatrydd cymunedol neu drwy’r sector preifat. Gallwch hefyd gyfeirio eich hun at y gwasanaeth drwy ffonio eich gwasanaeth GIG lleol a gofyn am rif y gwasanaeth therapi lleferydd ac iaith</li>
                <li><span class=’font-bold’>Canllawiau’r GIG:</span> Edrychwch ar <a href=’https://www.cpft.nhs.uk/speech-and-language-therapy-toolkit/’ target=’_blank’ class=’link’>Becyn Cymorth Therapi Iaith a Lleferydd GIG Swydd Gaergrawnt a Peterborough</a> i gael awgrymiadau a chyngor ar gefnogi datblygiad sgiliau lleferydd, iaith a chyfathrebu plant a phobl ifanc.<br><br>Os nad ydych yn byw yng Nghaergrawnt na Peterborough ond eisiau gwybod ble i gael cymorth lleol ar gyfer lleferydd, iaith a chyfathrebu eich plentyn, <a href=’https://www.gov.uk/find-local-council’ target=’_blank’ class=’link’>chwiliwch am wefan eich cyngor lleol</a>.</li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showFinancialSupport = !showFinancialSupport" @keyup.enter="showFinancialSupport = !showFinancialSupport" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Cymorth ariannol
                <span x-show="!showFinancialSupport" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showFinancialSupport" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <ul x-show="showFinancialSupport" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Gwiriwr budd-daliadau:</span> Defnyddiwch <a href=’https://www.turn2us.org.uk/’ target=’_blank’ class=’link’>Turn2Us</a> i wirio pa fudd-daliadau y gallech fod â hawl iddynt</li>
                <li><span class=’font-bold’>Cyngor ar Bopeth:</span> Ffoniwch 0800 144 8848 (England) neu 0800 702 2020 (Cymru) neu ewch i wefan <a href=’https://www.citizensadvice.org.uk/’ target=’_blank’ class=’link’>Cyngor ar Bopeth</a> i gael cyngor ar faterion ariannol a heriau eraill</li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showChildDevelopment = !showChildDevelopment" @keyup.enter="showChildDevelopment = !showChildDevelopment" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Datblygiad plant
                <span x-show="!showChildDevelopment" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showChildDevelopment" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <ul x-show="showChildDevelopment" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Camau datblygiadol yn ôl oedran:</span> Edrychwch ar <a href=’https://cambspborochildrenshealth.nhs.uk/child-development-and-growing-up/milestones/’ target=’_blank’ class=’link’>dudalen cerrig milltir datblygiadol GIG Swydd Gaergrawnt and Community</a> am ganllaw bras i gamau datblygiadol plant ac i weld pryd y gallai fod yn briodol cysylltu â’ch ymwelydd iechyd.<br><br>Os nad ydych yn byw yng Nghaergrawnt ond eisiau gwybod ble i gael cymorth lleol yn ymwneud â datblygiad eich plentyn, <a href=’https://www.gov.uk/find-local-council’ target=’_blank’ class=’link’>chwiliwch am wefan eich cyngor lleol</a>.</li>
                <li><span class=’font-bold’>Gweithgareddau i gefnogi datblygiad plant:</span> Defnyddiwch <a href=’https://www.bbc.co.uk/tiny-happy-people’ target=’_blank’ class=’link’>wefan CBeebies Parenting</a> i gael syniadau am weithgareddau i gefnogi datblygiad eich plentyn.</li>
              </ul>
            </div>
          </div>
          <div class="bg-bbc-yellow p-8 mt-8">
          <h2 class="text-3xl">Cymorth mewn argyfwng</h2>
            <ul class="list-disc mb-4 pl-6">
              <li>Ffoniwch 999 → mewn sefyllfaoedd sy’n bygwth bywyd. Mae’r gwasanaeth ar gael 24 awr y dydd, 7 diwrnod yr wythnos, ac mae’n rhad ac am ddim ledled y DU.</li>
              <li>Ffoniwch 111 → am help gyda’ch symptomau meddygol neu os nad ydych yn siŵr ble i gael help am bryder meddygol brys. Mae’r llinell gymorth ar gael 24/7.</li>
            </ul>
            <p>Cymorth emosiynol (24/7):</p>
            <ul class="list-disc pl-6 mb-4">
              <li><span class=’font-bold’>Childline (y DU):</span> Ffoniwch 0800 1111 i gael lle diogel a chyfrinachol i siarad â chynghorydd, 24 awr y dydd, 7 diwrnod yr wythnos, i unrhyw un o dan 19 oed ledled y DU.</li>
              <li><span class=’font-bold’>Samaritans:</span> Ffoniwch 116 123 i gael lle diogel a chyfrinachol i siarad, 24 awr y dydd, 7 diwrnod yr wythnos, ar gyfer pob oedran yn y DU ac Iwerddon.</li>
            </ul>
          </div>
      wales: 
        body: |
          <div class="bg-white p-5 md:p-10" x-data="{ showHealthVisitor: false, showChildDevelopment: false, showFindingLocalSupport: false, showExtraSupport: false }">
            <h2 class="text-3xl">Cymorth sydd ar gael i chi yng Nghymru</h2>
            <p>Mae gan bob teulu yng Nghymru fynediad at gymorth am ddim.</p>
            <p class="mb-10">Dechreuwch yma os nad ydych yn siŵr ble i droi</p>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showHealthVisitor = !showHealthVisitor" @keyup.enter="showHealthVisitor = !showHealthVisitor" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Eich Ymwelydd Iechyd
                <span x-show="!showHealthVisitor" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showHealthVisitor" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <div x-show="showHealthVisitor" class="mt-4">
                <p class="mb-4">Eich prif bwynt cyswllt.</p>
                <p>Os oes unrhyw beth yn peri pryder i chi, cysylltwch â’ch Ymwelydd Iechyd yn gyntaf.</p>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showChildDevelopment = !showChildDevelopment" @keyup.enter="showChildDevelopment = !showChildDevelopment" class="flex items-center text-xl gap-4 font-semibold cursor-pointer" tabindex=0>
                Gwiriadau datblygiad plant
                <span x-show="!showChildDevelopment" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showChildDevelopment" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <div x-show="showChildDevelopment" class="mt-4">
                <p class="mb-1">
                  Mae pob teulu yn cael cymorth drwy <a href="https://www.abbhealthiertogether.cymru.nhs.uk/professionals/health-visitors/healthy-child-programme">Raglen Plant Iach Cymru</a>.
                </p>
                <p class="mb-1">
                  Mae hyn yn golygu y bydd eich tîm Ymweld Iechyd yn cysylltu â chi ar adegau penodol wrth i’ch plentyn dyfu. Bydd hyn fel arfer yn digwydd ar adegau allweddol, fel yn ystod beichiogrwydd, adeg geni’r babi, yn 6 mis oed, ac wedyn.
                </p>
                <h4 class="font-bold mt-4 mb-1">
                  Canllawiau a chymorth i rieni
                </h4>
                <p class="mb-1">
                  <a href="https://www.gov.wales/parenting-give-it-time" target="_blank">Magu Plant. Rhowch Amser Iddo</a> → adnodd gan Lywodraeth Cymru sy’n cynnig y canlynol:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://www.gov.wales/parenting-give-it-time/your-childs-development" target="_blank" class="link">Deall Datblygiad Eich Plentyn</a> – canllawiau clir ar beth i’w ddisgwyl o enedigaeth hyd at 5 oed, ynghyd ag awgrymiadau i gefnogi pob cam
                  </li>
                  <li>
                    Cyngor dibynadwy i rieni – cymorth ymarferol, caredig a di-feirniadaeth ar bynciau cyffredin fel cysgu a bwydo
                  </li>
                </ul>
                <p>
                  Os oes rhywbeth yn eich poeni, gallwch gysylltu â’ch tîm Ymweld Iechyd unrhyw bryd. Nid oes angen aros am adolygiad.
                </p>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showFindingLocalSupport = !showFindingLocalSupport" @keyup.enter="showFindingLocalSupport = !showFindingLocalSupport" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Dod o hyd i gymorth lleol
                <span x-show="!showFindingLocalSupport" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showFindingLocalSupport" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <ul class="list-disc ml-6 mt-4" x-show="showFindingLocalSupport">
                <li>
                  <a href="https://www.gov.wales/find-your-local-family-information-service" target="_blank" class="link">Gwasanaeth Gwybodaeth i Deuluoedd (GGD)</a> → gall eich GGD lleol roi cyngor manwl i chi am ofal plant, cyllid a chymorth i deuluoedd
                </li>
                <li>
                  <a href="https://www.dewis.wales/" target="_blank" class="link">Dewis Cymru</a> → cyfeiriadur ehangach i chi ei ddefnyddio eich hun, sy’n cynnwys gwybodaeth am les cyffredinol, gweithgareddau lleol a chymorth cymunedol ledled Cymru
                </li>
                <li>
                  Llyfrgelloedd lleol → gweithgareddau am ddim, cymorth i rieni a hybiau cymunedol
                </li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showExtraSupport = !showExtraSupport" @keyup.enter="showExtraSupport = !showExtraSupport" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Cymorth ychwanegol (os ydych yn gymwys)
                <span x-show="!showExtraSupport" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="showExtraSupport" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <div x-show="showExtraSupport" class="mt-4">
                Gall <a href="https://www.gov.wales/flying-start-guide-parents-and-carers" target="_blank" class="link">Dechrau’n Deg</a> gynnig:
                <ul class="list-disc ml-6 my-4">
                  <li>Gofal plant am ddim (o 2 oed)</li>
                  <li>Cymorth rhianta</li>
                  <li>Cymorth lleferydd ac iaith</li>
                </ul>
                <p>
                  Gofynnwch i’ch Ymwelydd Iechyd neu'ch <a href="https://www.gov.wales/find-your-local-family-information-service" target="_blank" class="link">Gwasanaeth Gwybodaeth i Deuluoedd</a> a yw hyn yn berthnasol i chi.
                </p>
              </div>
            </div>
          </div>
          <div class="bg-white p-5 md:p-10 mt-8" x-data="{ childTalking: false, overwhelmed: false, childCries: false, supportDevelopment: false, speakWelsh: false, money: false }">
            <h2 class="text-3xl">Ar gyfer heriau bob dydd</h2>
            <p class="mb-10">Gallwch edrych ar y rhain os hoffech gael cymorth mwy penodol neu os oes gennych bryder penodol</p>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="childTalking = !childTalking" @keyup.enter="childTalking = !childTalking" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Rwy’n poeni am siarad neu gyfathrebu fy mhlentyn
                <span x-show="!childTalking" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
                <span x-show="childTalking" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></span>
              </a>
              <div x-show="childTalking" class="mt-4">
                <p class="mb-1">
                  Dechreuwch yma
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    Ewch i <a href="https://www.gov.wales/talk-with-me" target="_blank" class="link">Siarad Gyda Fi</a> → awgrymiadau a gweithgareddau
                  </li>
                  <li>
                    Eich ymwelydd iechyd (gweler uchod)
                  </li>
                </ul>
                <p>
                  Gallwch hefyd:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    Gysylltu â’ch tîm Therapi Lleferydd ac Iaith lleol y GIG (heb fod angen meddyg teulu yn y rhan fwyaf o ardaloedd)
                  </li>
                  <li>
                    Ffonio GIG 111 Cymru os nad ydych yn siŵr sut
                  </li>
                </ul>
                <p>
                  Adnoddau defnyddiol:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://speechandlanguage.org.uk/" target="_blank" class="link">Speech and Language UK</a> → cyngor am anghenion lleferydd ac iaith
                  </li>
                  <li>
                    Llyfrgelloedd lleol → sesiynau Stori a Chân am ddim
