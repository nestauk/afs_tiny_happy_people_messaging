      free: "<p>Mae’r gweithgareddau a ddangosir yn y fideos hyn yn adlewyrchu taith ddatblygiadol arferol rhwng 9 ac 27 mis oed.</p><p class='mt-2'>Os yw eich plentyn wedi cael diagnosis o anhawster lleferydd, iaith neu gyfathrebu, neu oedi datblygiadol—neu os oes gennych bryderon am y materion hyn—gallai eu cynnydd edrych yn wahanol i’r hyn a welwch yma.</p><p class='mt-2'>Os cafodd eich plentyn ei eni’n gynnar, gallai eu datblygiad ddilyn llinell amser ychydig yn wahanol, sy’n hollol arferol.</p><p class='mt-2'>Gellir dal i fwynhau ac addasu llawer o’r gweithgareddau ar draws ystod eang o gyfnodau datblygiadol. Fodd bynnag, rydym yn eich annog i ystyried anghenion unigol eich plentyn a, lle bo hynny’n ddefnyddiol, ceisio arweiniad gan weithiwr proffesiynol perthnasol er mwyn gwneud y gorau o’r gweithgareddau hyn.</p>"
