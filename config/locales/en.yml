  pages:
    about_us:
      title: "About us"
      page_title: "About us"
      body: |
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Nurturing your child’s growth with fun, free activities</h2>
        <p>Get bite-sized, expert-crafted activities that spark imagination - delivered to your phone, every week.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Why sign up?</h2>
        <p class="mb-3">Parents get free, bite-sized, expert-developed activities delivered to their phone, every week.</p>
        <p>The CBeebies Parenting texting programme is designed to offer parenting support and a journey tailored to your family’s unique needs, with texts at a time most convenient for parents and their busy schedules. Each activity is from BBC Education’s catalogue of CBeebies Parenting videos, designed by experts to support your child’s language and learning and strengthen your bond with your child.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">About Nesta</h2>
        <p>The CBeebies Parenting texting programme is a service run by Nesta, the UK’s innovation agency for social good in partnership with the University of Sheffield and BBC Education. Nesta’s A Fairer Start team is working to break the link between family background and life chances. From 2030, every child will have the same chance of developing to their full potential in the early years.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900" id="our_partners">About our partners</h2>
        <p class="mb-3">The CBeebies Parenting texting programme was first developed by Professor Danielle Matthews at the University of Sheffield and BBC Education to deliver the free online resources of CBeebies Parenting to caregivers to evaluate via a trial if texting CBeebies Parenting video resources to families supports caregiver-child interaction and ultimately results in better language outcomes for children.</p>
        <p>Since 2024, Nesta has been working in an innovation partnership with Professor Danielle Matthews and BBC Education to further develop the CBeebies Parenting texting programme. Since the beginning of our partnership, Nesta has been working to continue to develop, test, and scale the CBeebies Parenting texting programme to reach more parents across the UK and contribute towards our mission goal of breaking the link between family background and life chances.</p>
        <h2 class="mt-5 mb-3 text-xl md:text-2xl text-blue-900">Get in touch</h2>
        <p>We’re working in partnership with local authorities across the UK, the University of Sheffield, and BCC Education to deliver this service. Please get in touch if you’d like to explore how you can contribute or how we can improve the service. Email us at <a href=’mailto:info@cbeebies-text.uk’ class=’link’>info@cbeebies-text.uk</a>.</p>
