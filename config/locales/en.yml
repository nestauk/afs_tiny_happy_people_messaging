    cookie_policy:
      title: "Cookie policy"
      page_title: "Cookie policy"
      body: |
        <h2>About cookies</h2>
        <p class="mb-2">
          Cookies are small text files that are placed on your computer by the websites you visit. Cookies allow us to identify you (or, more accurately, your computer) when you visit our website. Knowing how often people are visiting each page of our website helps us work out how and where to improve our website.
        </p>
        <p class="mb-2">
          Our website uses a mix of necessary and non-essential (performance and marketing) cookies. While the essential cookies are needed to make the site function properly, you can set your preferences for the non-essential cookies by using our cookie preferences tool. This will appear automatically the first time you visit our site or if you open up our site in a private web browser. You can also find it at any point by clicking the icon in the bottom left of the screen.
        </p>
        <p class="mb-6">
          <strong>This cookie policy is part of our <a href="/privacy_policy" class="link">Privacy Policy.</a></strong>
        </p>
        <h2>Types of cookie</h2>
        <p class="mb-2">
          There are different categories of cookies:
        </p>
        <p class="mb-2">
          <strong>Necessary</strong> cookies help make our website usable by enabling basic functions like page navigation and access to secure areas of the website. The website cannot function properly without these cookies and you cannot disable these cookies through the preference settings on our site. You can disable these by changing your browser settings, though this will result in some parts of our website not working.
        </p>
        <p class="mb-2">
          <strong>Functional</strong> cookies enable us to enhance the functionality of our website, for example by providing you with a more personalised experience based on previous preferences you may have selected or your previous visits. You can disable these cookies through the preference settings on our site or your browser settings however this may result in some parts of the website not working properly.
        </p>
        <p class="mb-2">
          <strong>Performance or analytics</strong> cookies help us understand how visitors interact with our websites by collecting and reporting information anonymously. They help us to improve the performance of our website. These cookies will not be enabled unless you have consented to this.
        </p>
        <p class="mb-6">
          <strong>Marketing</strong> cookies are used to track visitors across websites. The intention is to display content and ads that are relevant and engaging for the individual user and therefore more valuable. These cookies will not be enabled unless you have consented to this.
        </p>
        <h2>Persistent cookies and session cookies</h2>
        <p class="mb-2">
          <strong>Persistent</strong> cookies remain on a visitor’s device for a set amount of time. This means for example that we can identify when a site visitor is a repeat visitor or new to us.
        </p>
        <p class="mb-6">
          <strong>Session</strong> cookies are created temporarily and last for as long as your browser window is open, being automatically deleted after you close your browser. These allow us to link the actions of a user during a visit to the website, to provide a consistent experience.
        </p>
        <h2>First party cookies and third-party cookies</h2>
        <p class="mb-2">
          <strong>First-party cookies</strong> are set directly by our website.
        </p>
        <p class="mb-2">
          <strong>Third-party cookies</strong> are set by another website, usually because we have incorporated elements from those other sites into our site (for example videos or social media plugins).
        </p>
        <p class="mb-6">
          The pixel code cookie tracks user actions on our web pages, such as visiting a page or clicking a button. It then sends this information to our advertising platforms (Meta, TikTok, and Reddit) to help us understand what our visitors are doing. The data is used to measure results, for retargeting and for creating custom audiences.
        </p>
        <h2>The cookies we use</h2>
        <p class="mb-2">
          Details about the cookies we use are set out below. Some of these are third-party cookies.
        </p>
        <p class="mb-2">
          The following cookies are essential cookies:
        </p>
        <p class="mb-2">
          <strong>_afs_tiny_happy_people_session</strong> This is a necessary functional cookie used to keep track of when a user is logged into the siteCookieControl This cookie records a user's preferences for analytics and marketing cookies and remembers if you have set your cookie preferences on our site.
        </p>
        <p class="mb-6">
          <strong>CookieControl</strong> This cookie records a user's preferences for analytics and marketing cookies and remembers if you have set your cookie preferences on our site.
        </p>
        <h2>Google analytics cookies</h2>
        <p class="mb-2">
          <strong>gtag.js</strong> This cookie is used to identify unique users and sessions. It contains a randomly generated identifier that is used to calculate visitor, session, and campaign data.
        </p>
        <p class="mb-2">
          <strong>analytics.js</strong>. These cookies are used for tracking user interactions on the website.
        </p>
        <p class="mb-2">
          <strong>_ga</strong> This cookie helps us monitor the use and performance of our website. It expires in 2 years.
        </p>
        <p class="mb-2">
          <strong>_gid</strong> This cookie helps us monitor the use and performance of our website. It expires in 24 hours.
        </p>
        <p class="mb-2">
          The <strong>_utma</strong> cookie stores the number of visits made from the users’ device, the time of the first visit, the previous visit and the current visit.
        </p>
        <p class="mb-6">
          The <strong>_utmb</strong> cookie helps us track how long a user stays on our site. This cookie does not contain any personal information other than the IP address of your device.
        </p>
        <h2>Third party cookies</h2>
        <p class="mb-2">
          This website uses cookies provided by other organisations to support functions such as statistical performance analysis, rich media functionality and social sharing. These are third party cookies. You can read privacy policies from these third parties below:
        </p>
        <ul class="list-disc pl-4 pt-2 mb-6">
          <li>We use Google Analytics for statistical performance analysis. This information is aggregated and therefore anonymous. <a href="https://policies.google.com/privacy" class="link" target="_blank">Read Google’s privacy policy</a>. To opt out of being tracked by Google Analytics on the CBeebies Parenting website you can use our cookie preferences tool. To opt out of being tracked by Google Analytics across all websites visit tools.google.com/dlpage/gaoptout.</li>
        </ul>
        <h3 class="text-xl mb-1">Meta (Facebook and Instagram)</h3>
        <p class="mb-2">These cookies are used in connection with the Meta Pixel, which lets us measure how our adverts on Facebook and Instagram perform and show ads to people who have visited our website.</p>
        <p class="mb-2"><strong>_fbp</strong> Set by us. Stores a unique identifier so that Meta can match actions you take on our website to adverts you may have seen on Facebook or Instagram. Expires in 90 days.</p>
        <p class="mb-2"><strong>datr</strong> Set by Facebook to recognise the web browser you are using. Facebook uses it to detect suspicious activity, prevent fraudulent logins and protect its services from spam and abuse. Expires in 2 years.</p>
        <h3 class="text-xl mb-1">TikTok</h3>
        <p class="mb-2">These cookies are used in connection with the TikTok Pixel, which lets us measure how our adverts on TikTok perform and reach people who may be interested in what we offer.</p>
        <p class="mb-2"><strong>_ttp</strong> Set by us. Stores a unique identifier so that TikTok can match actions you take on our website to adverts you may have seen on TikTok. Expires in 13 months.</p>
        <p class="mb-2"><strong>_tt_enable_cookie</strong> Set by us. Records whether your browser allows TikTok cookies, so the TikTok Pixel knows whether it can store an identifier on your device. Expires in 13 months</p>
        <h3 class="text-xl mb-1">Reddit</h3>
        <p class="mb-2">These cookies are used in connection with the Reddit Pixel, which lets us measure how our adverts on Reddit perform and show ads to people who have visited our website.</p>
        <p class="mb-2"><strong>_rdt_uuid</strong> Set by us. Stores a unique identifier so that Reddit can match actions you take on our website to adverts you may have seen on Reddit. Expires in 3 months</p>
        <p class="mb-2"><strong>loid</strong> Set by Reddit. A long-lived identifier that Reddit sets for visitors who are not signed in to a Reddit account. Used to recognise your browser across visits for advertising and analytics. Expires in 2 years.</p>
        <p class="mb-2"><strong>edgebucket</strong> Set by Reddit. Used by Reddit to deliver advertising, to assign visitors to test groups for new features, and to help route traffic across Reddit's services. Expires in 1 year.</p>
        <p class="mb-2"><strong>csv</strong> Set by Reddit. An internal Reddit cookie used to support advertising and other functions on Reddit's services. Reddit does not publish detailed information about this cookie. Expires in 5 years.</p>
        <p class="mb-2"><strong>pc</strong> Set by Reddit. An internal Reddit cookie used to support advertising and other functions on Reddit's services. Reddit does not publish detailed information about this cookie. Short lived cookie.</p>
        <p class="mb-6"><strong>eu_cookie</strong> Set by Reddit. Records that Reddit's own cookie banner has been shown to your browser, so it isn't displayed again unnecessarily. Expires in 1 year</p>
        <h2>Control your cookie settings</h2>
        <p class="mb-2">
          If you want, you can block cookies by changing the settings on your browser – we have set out below links to the help pages of some major browsers which explain how you can do this. Blocking the cookies we use may have an adverse impact on the presentation of some or all of our website. General guidance on how to manage your cookies can be found here:
        </p>
        <p class="mb-2">
          <a href="http://www.youronlinechoices.eu/" target="_blank" class="link">Your Online Choices</a>
        </p>
        <p class="mb-2">
          Specific guidance on how to manage cookie options for common website browsers can be found here:
        </p>
        <ul class="list-disc pl-4 pt-2 mb-6">
          <li><a href="http://www.google.com/support/chrome/bin/answer.py?hl=en&answer=95647" target="_blank" class="link">Google Chrome</a></li>
          <li><a href="https://support.mozilla.org/en-US/kb/enable-and-disable-cookies-website-preferences" target="_blank" class="link">Mozilla Firefox</a></li>
          <li><a href="https://support.apple.com/en-gb/guide/safari/manage-cookies-and-website-data-sfri11471/mac" target="_blank" class="link">Safari</a></li>
          <li><a href="https://support.microsoft.com/en-gb/help/17442/windows-internet-explorer-delete-manage-cookies" target="_blank" class="link">Internet Explorer</a></li>
          <li><a href="https://privacy.microsoft.com/en-us/windows-10-microsoft-edge-and-privacy" target="_blank" class="link">Microsoft Edge</a></li>
        </ul>
    accessibility:
      title: "Accessibility statement for CBeebies Parenting"
      page_title: "Accessibility"
      body: |
        <p class="mb-4">
          This accessibility statement applies to Cbeebies Parenting <a href="https://www.cbeebies-text.uk" class="link">cbeebies-text.uk</a>.
        </p>
        <p class="mb-4">This website is run by Nesta. We want as many people as possible to be able to use this website. For example, that means you should be able to:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>change colours, contrast levels and fonts</li>
          <li>zoom in up to 300% without the text spilling off the screen</li>
          <li>navigate most of the website using just a keyboard</li>
          <li>navigate most of the website using speech recognition software</li>
          <li>listen to most of the website using a screen reader (including the most recent versions of JAWS, NVDA and VoiceOver)</li>
        </ul>
        <p class="mb-4">We’ve also made the website text as simple as possible to understand.</p>
        <p class="mb-4">
          <a href="https://mcmw.abilitynet.org.uk/" target="_blank" class="link">AbilityNet</a> has advice on making your device easier to use if you have a disability.
        </p>
        <h2>How accessible this website is</h2>
        <p class="mb-4">We know some parts of this website are not fully accessible:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>some video content may not have text alternatives or audio descriptions</li>
          <li>video elements may have inappropriate markup which may cause unexpected announcements</li>
        </ul>
        <h2>Feedback and contact information</h2>
        <p class="mb-4">If you need information on this website in a different format like accessible PDF, large print, easy read, audio recording or braille:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>Email <a href="mailto:info@cbeebies-text.uk" class="link">info@cbeebies-text.uk</a></li>
          <li>Call 020 7438 2500</li>
        </ul>
        <p class="mb-4">We’ll consider your request and get back to you in 5 days.</p>
        <h2>Reporting accessibility problems with this website</h2>
        <p class="mb-4">We’re always looking to improve the accessibility of this website. If you find any problems not listed on this page or think we’re not meeting accessibility requirements, contact the team by emailing <a href="mailto:info@cbeebies-text.uk" class="link">info@cbeebies-text.uk</a> or by calling 020 7438 2500.</p>
        <h2>Technical information about this website’s accessibility</h2>
        <h3>Compliance status</h3>
        <p class="mb-4">This website is partially compliant with the <a href="https://www.w3.org/TR/WCAG22/" target="_blank" class="link">Web Content Accessibility Guidelines version 2.2 AA standard</a>, due to the non-compliances listed below.</p>
        <h2>Non-accessible content</h2>
        <p class="mb-4">The content listed below is non-accessible for the following reasons.</p>
        <h3>Non-compliance with the accessibility regulations</h3>
        <p class="mb-4">Embedded video elements have a generic title that does not represent the video content. This fails WCAG 2.2 success criterion 1.1.1 (Non-Text Content).</p>
        <p class="mb-4">We plan to resolve this by: 21st May 2026</p>
        <p class="mb-4">The video present on the page only has auto-generated captions. This fails WCAG 2.2 success criterion 1.2.2 (Captions (Pre-Recorded)).</p>
        <p class="mb-4">We plan to resolve this by: 21st May 2026</p>
        <p class="mb-4">Videos lack a text transcript or audio description alternative. This fails WCAG 2.2 success criterion 1.2.3 (Audio Description or Media Alternative (Pre-Recorded)).</p>
        <p class="mb-4">We plan to resolve this by: 21st May 2026</p>
        <p class="mb-4">Video content lacks an audio description track describing the visual elements of the video. This fails WCAG 2.2 success criterion 1.2.5 (Audio Description (Pre-Recorded)</p>
        <p class="mb-4">We plan to resolve this by: 21st May 2026</p>
        <p class="mb-4">The video iframe on the page has an inappropriate aria attribute. This may cause screen readers to announce content unexpectedly. This fails WCAG 2.2 success criterion 4.1.2 (Name, Role, Value)</p>
        <p class="mb-4">We plan to resolve this by: 21st May 2026</p>
        <h2>Preparation of this accessibility statement</h2>
        <p class="mb-4">This statement was prepared on 01/05/2026 It was last reviewed on 01/05/2026.</p>
        <p class="mb-4">This website was last tested on 30/04/2026. The test was carried out by Zoonou</p>
        <p class="mb-4">Zoonou used <a href="https://www.w3.org/TR/WCAG-EM" target="_blank" class="link">WCAG-EM</a> to define the pages tested and test approach.</p>
