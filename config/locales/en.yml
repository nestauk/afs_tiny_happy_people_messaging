    privacy_policy:
      title: "Privacy policy"
      page_title: "Privacy policy"
      body: |
        <p>This website is owned and operated by Nesta - you can find our full details below. This privacy policy explains how Nesta uses personal information we collect via this site. We are committed to protecting your privacy and we take all reasonable precautions to safeguard personal information.</p>
        <h2 class="mt-6">What kind of information do we collect?</h2>
        <p class="mb-4"><strong>Sign-up details:</strong> If you sign up to our text messaging programme, we will ask you for personal information such as your name, phone number and postcode as well as the month and year of your child’s birth. We also ask for optional information to personalise your experience such as your child’s name or nickname, and optional information to improve our service such as your interests.</p>
        <p class="mb-4"><strong>Research:</strong> We may ask you to participate in research we are conducting and we may contact you to ask for further information about you or your experiences or opinions.</p>
        <p class="mb-4"><strong>Feedback and surveys:</strong> We may also ask you for feedback or to complete surveys.</p>
        <p class="mb-4"><strong>Online activity:</strong> When you use our website, we obtain information about the device from which you accessed it, your visits and use of the website including your browser type and version, referrer and activity. We collect this information through first-party analytics tools that are built into our website, without using cookies or third-party tracking technologies.</p>
        <h2 class="mt-6">What do we do with information we collect and what is our legal basis for this?</h2>
        <p class="mb-4"><strong>Sign-up details:</strong> If you sign up to our text messaging programme we will use your personal information to send text messages to you. Our legal basis for doing this is your consent. You have the right to withdraw this consent at any time. We will also share postcodes with our partner University of Sheffield who will cross-reference with that of CBeebies Parenting research participants, under the terms of our data sharing agreement.</p>
        <p class="mb-4"><strong>Third party processors:</strong> We use a third party processor called Twilio to deliver text messages. In using this third party we are pursuing our legitimate interest to use third party technology to achieve greater efficiency within our organisation. To balance our interests against yours, we enter into legally binding contractual arrangements with Twilio and take steps to ensure it maintains appropriate technical and organisational measures to keep your personal information secure. For more information see the <a href=’https://www.twilio.com/en-us/privacy’ target=’_blank’>Twilio privacy policy</a>.</p>
        <p class="mb-4"><strong>Research:</strong> If you agree to take part in any research we will use your information for the purpose of that research project or programme. Full details of how your personal information will be used will be given to you at the time you agree to participate; this could include to inform the development of a new prize, project, programme or other initiative, being incorporated into reports or other research outcomes, and may include being publicly displayed on web pages relating to the particular research project or programme.</p>
        <p class="mb-4"><strong>Feedback and surveys:</strong> If you agree to give us feedback or complete a survey, we will use the information to improve our work and activities.</p>
        <p class="mb-4"><strong>For all kinds of information collected:</strong> Please make sure that all personal details you provide are accurate and up to date, and let us know about any changes. Please get consent first before giving us anyone else’s information.</p>
        <p class="mb-4">The nature of Nesta’s work means we often work in partnership with other organisations, however, we will not share your information with any other organisation unless we have your permission first, or we have a legitimate interest or legal requirement to do so.</p>
        <p class="mb-4">We may also use your information to carry out analysis and research to improve our publications, events and activities, customise our website and its content to your particular preferences, notify you of any changes to our website or to our activities that may affect you, to prevent and detect fraud and abuse, and to protect other users.</p>
        <p class="mb-4">However you choose to engage with Nesta, we may retain your information for our own legitimate business interests for statistical analysis purposes, in order to review, develop and improve our business activities. In this situation, we will only keep any personal information if it is necessary to do so, and will always put in place appropriate technical and administrative safeguards, including where possible anonymising or minimising the personal information retained.</p>
        <p class="mb-4">We use a third party to provide cloud based data security, storage and disaster recovery service to backup data that we hold.</p>
        <h2 class="mt-6">How long will we keep your information for?</h2>
        <p class="mb-4"><strong>General principle:</strong> We will only keep any personal information that you provide to us for as long as is necessary to fulfil the purpose for which you gave us the information. We will securely delete information when it is no longer needed for that purpose, as explained in more detail below.</p>
        <p class="mb-4"><strong>Text messaging programme evaluation:</strong> If you take part in the text messaging programme, your personal data will be kept for the duration of the programme and for a period of three years after for the purposes of evaluating the success of this pilot programme and to allow the project team to use the findings to inform any future iterations.</p>
        <p class="mb-4"><strong>Research:</strong> If you agree to take part in any research your personal information will be kept for as long as it is of value to Nesta and the wider research community, and for as long as may be specified by any external research funder, patent law, legislative and other regulatory requirements. Research data shall be reviewed at least every 5 years to consider its continued value to Nesta, and personal data anonymised or pseudonymised where possible, unless to do so would affect the integrity of the research data and/or its outcomes, or its future value.To the extent that Personal Data arising from any research is embodied within a research report or other research outcome, it will be retained in perpetuity as part of the published materials. Research that supports the development of a prize, project, programme, publication or other research outcome, shall be kept for at least 5 years beyond publication or any other research outcome has been completed. If the research is funded or the subject of any other contract, your personal data may be kept for 6 years after the end of the contract or longer if the contract or funding agreement specifies, which could be up to 12 years after the contract ends.</p>
        <p class="mb-6"><strong>Processing for statistical analysis purposes:</strong> This type of processing will only be undertaken whilst we retain your personal information in line with the principles explained above.</p>
        <h2 class="mt-6">Cookies</h2>
        <p class="mb-4">This site uses cookies. Cookies are small text files that are placed on your computer by websites you visit. They are widely used to make websites work, or work more efficiently, as well as to provide some useful information to site owners. Most web browsers allow some control of most cookies through browser settings.</p>
        <p class="mb-4">This site uses a variety of types of cookies. Some are strictly necessary to enable you to move around the site or to provide certain basic features, such as logging into secure areas.</p>
        <p class="mb-4">The site also uses performance cookies which collect information about how you use the site, such as how you are referred to it and how long you stay on certain pages. This information is aggregated and therefore anonymous and is used to improve the performance of the site. If you want, you can opt out of these cookies via our cookie preferences tool. Please note that some of the features of the site may not work if you choose to block cookies. To find out more about cookies, see our <a href="/cookie-policy">Cookie Policy</a>.</p>
        <p class="mb-4">We also use third party tracking cookies for remarketing, including Google Adwords. These third parties help us to send you tailored advertisements about Nesta that we think may be of interest to you, based on what parts of Nesta’s websites you have viewed. The advertisements will be shown to you on other search results pages, or on sites within Google’s or any other third party display network. We do not collect any identifiable information through the use of these third party remarketing services.</p>
        <p class="mb-4">If you do not wish to receive such advertisements, then you can adjust your preferences using our cookie preferences tool. For more information on how Google uses advertising cookies, and to manage your settings and opt-out of these features on the <a href="https://support.google.com/analytics/answer/6004245?hl=en" target="_blank" class="link">Google support website</a>.</p>
        <h2 class="mt-6">Security</h2>
        <p>We take steps to protect your personal information and follow procedures designed to minimise unauthorised access or disclosure of your information.</p>
        <p>In the event that whilst using our site(s) you become aware of any potential vulnerabilities, please let us know. Please see our <a href="https://www.nesta.org.uk/vulnerability-disclosure-policy/" target="_blank" class="link">vulnerability disclosure policy</a> for guidance on how to report a vulnerability.</p>
        <h2 class="mt-6">Contacting us, exercising your rights and complaints</h2>
        <p>You are legally entitled to know what personal information we hold about you and how that information is processed, which includes the right to:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>ask us to correct any mistakes in your information which we hold</li>
          <li>ask us to delete your personal information</li>
          <li>ask us to stop using your personal information or restrict how we can use it, for example if you feel it is inaccurate or no longer needs to be used by Nesta</li>
          <li>to object to us using of your personal information</li>
          <li>to object to any automated decision making that we may do using your personal information</li>
        </ul>
        <p class="mb-4">If you wish to know what information we hold about you, or wish to exercise any of your other rights as detailed above, or have any complaint about how we are using your personal information, then please email us using information@nesta.org.uk or write to us at 58 Victoria Embankment London EC4Y 0DS UK and provide enough information to identify yourself (e.g. name and address or any registration details).</p>
        <p class="mb-4">If our information is incorrect or out of date, please provide us with enough information to allow us to update it. If you want us to delete, restrict or stop using any information we hold about you, please specifically confirm the reasons why you are asking this. If you are unhappy with how we are using your information, again please explain to us the reasons and we will investigate the matter.</p>
        <p class="mb-4">You can also write to the same address if you have a complaint about this policy.</p>
        <p>If you are unhappy with how any data rights request or complaint has been dealt with you have the right to complain to the Information Commissioner:</p>
        <ul class="list-disc pl-4 pt-2 mb-4">
          <li>On the <a href="https://ico.org.uk/concerns" target="_blank" class="link">ICO website</a>;</li>
          <li>By mail at Wycliff House, Water Lane, Wilmslow, Cheshire SK9 5AF, or</li>
          <li>By calling the helpline on 0303 123 1113.</li>
        </ul>
        <p>This contact information for the Information Commissioner’s Office is correct as at the time this privacy policy is published.</p>
        <h2 class="mt-6">Changes to the privacy policy</h2>
        <p class="mb-4">We may change this privacy policy from time to time. We will notify you of any changes that relate to information we already hold about you, where practicable. You should check this policy occasionally to ensure you are aware of the most recent version that will apply each time you access this website.</p>
        <p>Nesta, a company limited by guarantee registered in England and Wales with company number 7706036 and charity number 1144091.<br>Registered as a charity in Scotland number SC042833.<br>Registered office: 58 Victoria Embankment, London, EC4Y 0DS<br>Email: information@nesta.org.uk</p>
    resources:
      page_title: "Resources for caregivers"
      title: "Resources for you and your little one"
      text: "We've compiled a list of helpful resources below to support you in navigating any challenges you may face while caring for your little ones."
      english_resources: Look at resources available in England
      welsh_resources: Look at resources available in Wales
      england:
        body: |
          <div class="bg-white p-5 md:p-10" x-data="{ showMentalHealth: false, showSpeechLanguage: false, showFinancialSupport: false, showChildDevelopment: false }">
            <h2 class="text-3xl mb-10">Resources available in England</h2>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showMentalHealth = !showMentalHealth" @keyup.enter="showMentalHealth = !showMentalHealth" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Mental Health Support for Parents and Children
                <span x-show="!showMentalHealth" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showMentalHealth" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul x-show="showMentalHealth" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>NHS Mental Health Support:</span> Get advice about mental health difficulties and <a href=’https://www.nhs.uk/mental-health/’ target=’_blank’ class=’link’>find local support</a></li>
                <li class="mb-4"><span class=’font-bold’>Local Mental Health Services:</span> <a href=’https://www.nhs.uk/nhs-services/gps/’ target=’_blank’ class=’link’>Consult your GP</a> for referrals</li>
                <li class="mb-4"><span class=’font-bold’>Mind:</span> Call 0300 123 3393 or <a href=’https://www.mind.org.uk/’ target=’_blank’ class=’link’>go online</a> to access information, advice and support for your or a loved one’s mental health needs, including supported self-help for adults living in England and the Channel Islands</li>
                <li><span class=’font-bold’>Anna Freud:</span> Call 020 7794 2313 or <a href=’https://www.annafreud.org/resources/family-wellbeing/’ target=’_blank’ class=’link’>go online</a> to access resources to help support a child experiencing mental health difficulties</li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showSpeechLanguage = !showSpeechLanguage" @keyup.enter="showSpeechLanguage = !showSpeechLanguage" class="flex items-center text-xl gap-4 font-semibold cursor-pointer" tabindex=0>
                Speech, Language and Communication Difficulties
                <span x-show="!showSpeechLanguage" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showSpeechLanguage" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul x-show="showSpeechLanguage" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Local Speech and Language Therapy:</span> You can get a referral to a speech and language therapy department through your GP, health visitor, district nurse, nursery staff or your child’s teacher, children’s centre, community paediatrician or through the private sector. You can also refer yourself to the service by calling your local NHS service and asking for the speech and language therapy number.</li>
                <li><span class=’font-bold’>NHS Guidance:</span> View <a href=’https://www.cpft.nhs.uk/speech-and-language-therapy-toolkit/’ target=’_blank’ class=’link’>NHS Cambridgeshire and Peterborough’s Speech Language Therapy Toolkit</a> for tips and advice to help with the development of children and young people’s speech, language and communication skills.<br><br>If you don’t live in Cambridgeshire or Peterborough but would like to know where to get local support for your child’s speech, language and communication, <a href=’https://www.gov.uk/find-local-council’ target=’_blank’ class=’link’>find your local council’s website</a>.</li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showFinancialSupport = !showFinancialSupport" @keyup.enter="showFinancialSupport = !showFinancialSupport" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Financial Support
                <span x-show="!showFinancialSupport" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showFinancialSupport" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul x-show="showFinancialSupport" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Benefit Checker:</span> Use <a href=’https://www.turn2us.org.uk/’ target=’_blank’ class=’link’>Turn2Us</a> to check your benefit eligibility.</li>
                <li><span class=’font-bold’>Citizens Advice:</span> Call 0800 144 8848 (England) or 0800 702 2020 (Wales) or visit <a href=’https://www.citizensadvice.org.uk/’ target=’_blank’ class=’link’>Citizen’s Advice website</a> to get guidance on financial issues and other challenges at Citizens Advice.</li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showChildDevelopment = !showChildDevelopment" @keyup.enter="showChildDevelopment = !showChildDevelopment" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Child Development
                <span x-show="!showChildDevelopment" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showChildDevelopment" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul x-show="showChildDevelopment" class="mt-4">
                <li class="mb-4"><span class=’font-bold’>Developmental milestones by age:</span> Check out the <a href=’https://cambspborochildrenshealth.nhs.uk/child-development-and-growing-up/milestones/’ target=’_blank’ class=’link’>NHS Cambridgeshire and Community’s Milestones page</a> for a rough guide on children’s different developmental milestones and when to contact your health visitor.<br><br>If you don’t live in Cambridgeshire but would like to know where to get local support related to your child’s development, <a href=’https://www.gov.uk/find-local-council’ target=’_blank’ class=’link’>find your local council’s website</a>.</li>
                <li><span class=’font-bold’>Activities to promote children’s development:</span> Use the <a href=’https://www.bbc.co.uk/tiny-happy-people’ target=’_blank’ class=’link’>CBeebies Parenting website</a> to find ideas for activities to promote your children’s development. This is one of the websites we asked you to view in your interview with us.</li>
              </ul>
            </div>
          </div>
          <div class="bg-bbc-yellow p-8 mt-8">
            <h2 class="text-3xl">I need urgent help</h2>
            <ul class="list-disc mb-4 pl-6">
              <li>Call 999 → life-threatening emergency</li>
              <li>Call 111 → urgent medical help</li>
            </ul>
            <p>Emotional support (24/7):</p>
            <ul class="list-disc pl-6 mb-4">
              <li><span class=’font-bold’>Childline (UK):</span> Call 0800 1111 for a safe, confidential space to talk with a counsellor, available 24/7 for anyone under 19 across the UK</li>
              <li><span class=’font-bold’>Samaritans:</span> Call 116 123 for a safe, confidential space to talk, available 24/7 for all ages in the UK and Ireland</li>
            </ul>
          </div>
      wales: 
        body: |
          <div class="bg-white p-5 md:p-10" x-data="{ showHealthVisitor: false, showChildDevelopment: false, showFindingLocalSupport: false, showExtraSupport: false }">
            <h2 class="text-3xl">Your built-in support in Wales</h2>
            <p>Every family in Wales has access to free support.</p>
            <p class="mb-10">Start here if you’re unsure where to go</p>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showHealthVisitor = !showHealthVisitor" @keyup.enter="showHealthVisitor = !showHealthVisitor" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Your Health Visitor
                <span x-show="!showHealthVisitor" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showHealthVisitor" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="showHealthVisitor" class="mt-4">
                <p class="mb-4">Your main point of contact.</p>
                <p> If you’re worried about anything, contact your Health Visitor first.</p>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showChildDevelopment = !showChildDevelopment" @keyup.enter="showChildDevelopment = !showChildDevelopment" class="flex items-center text-xl gap-4 font-semibold cursor-pointer" tabindex=0>
                Child Development Checks
                <span x-show="!showChildDevelopment" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showChildDevelopment" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="showChildDevelopment" class="mt-4">
                <p class="mb-1">
                  All families are supported by the <a href="https://www.abbhealthiertogether.cymru.nhs.uk/professionals/health-visitors/healthy-child-programme">Healthy Child Wales Programme</a>.
                </p>
                <p class="mb-1">
                  This means you’ll have <strong>planned check-ins with your Health Visiting team</strong> as your child grows. These usually happen around key times, such as during pregnancy, when baby is born, 6 months, and beyond.
                </p>
                <h4 class="font-bold mt-4 mb-1">
                  Guidance and Support for Parents
                </h4>
                <p class="mb-1">
                  <a href="https://www.gov.wales/parenting-give-it-time" target="_blank">Parenting. Give it Time</a> → Welsh Government resource that offers both:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://www.gov.wales/parenting-give-it-time/your-childs-development" target="_blank" class="link">Understanding Your Child’s Development</a> – clear guidance on what to expect from ages 0–5, with tips to support each stage
                  </li>
                  <li>
                    Trusted Parenting Advice – practical, non-judgmental support on common topics such as sleeping and feeding
                  </li>
                </ul>
                <p>
                  If something is worrying you, you can contact your Health Visitor team at any time. You don’t need to wait for a review.
                </p>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showFindingLocalSupport = !showFindingLocalSupport" @keyup.enter="showFindingLocalSupport = !showFindingLocalSupport" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Finding local support
                <span x-show="!showFindingLocalSupport" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showFindingLocalSupport" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul class="list-disc ml-6 mt-4" x-show="showFindingLocalSupport">
                <li>
                  <a href="https://www.gov.wales/find-your-local-family-information-service" target="_blank" class="link">Family Information Service (FIS)</a> → your local FIS can give you in-depth advice on childcare, funding, and support for families
                </li>
                <li>
                  <a href="https://www.dewis.wales/" target="_blank" class="link">Dewis Cymru</a> → a wider, self-service directory covering general wellbeing, local activities, and community support across Wales
                </li>
                <li>
                  Local libraries → free activities, parent support and community hubs
                </li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="showExtraSupport = !showExtraSupport" @keyup.enter="showExtraSupport = !showExtraSupport" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                Extra support
                <span x-show="!showExtraSupport" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="showExtraSupport" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="showExtraSupport" class="mt-4">
                <a href="https://www.gov.wales/flying-start-guide-parents-and-carers" target="_blank" class="link">Flying Start (Dechrau’n Deg)</a> can offer:
                <ul class="list-disc ml-6 my-4">
                  <li>Free childcare (from age 2)</li>
                  <li>Parenting support</li>
                  <li>Speech & language help</li>
                </ul>
                <p>
                  Ask your Health Visitor or <a href="https://www.gov.wales/find-your-local-family-information-service" target="_blank" class="link">FIS</a> if this applies to you.
                </p>
              </div>
            </div>
          </div>
          <div class="bg-white p-5 md:p-10 mt-8" x-data="{ childTalking: false, overwhelmed: false, childCries: false, supportDevelopment: false, speakWelsh: false, money: false }">
            <h2 class="text-3xl">For everyday challenges</h2>
            <p class="mb-10">You can explore these if you want tailored support or have a specific concern</p>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="childTalking = !childTalking" @keyup.enter="childTalking = !childTalking" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                I’m worried about my child’s talking or communication
                <span x-show="!childTalking" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="childTalking" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="childTalking" class="mt-4">
                <p class="mb-1">
                  Start here:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    Visit <a href="https://www.gov.wales/talk-with-me" target="_blank" class="link">Talk with Me</a> (Siarad Gyda Fi) → tips and activities
                  </li>
                  <li>
                    Your health visitor (see above)
                  </li>
                </ul>
                <p>
                  You can also:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    Contact your local NHS Speech & Language Therapy team (no GP needed in most areas)
                  </li>
                  <li>
                    Call NHS 111 Wales if you’re unsure how
                  </li>
                </ul>
                <p>
                  Helpful resources:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://speechandlanguage.org.uk/" target="_blank" class="link">Speech and Language UK</a> → advice on speech & language needs
                  </li>
                  <li>
                    Local libraries → free Story & Song sessions
                  </li>
                </ul>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="overwhelmed = !overwhelmed" @keyup.enter="overwhelmed = !overwhelmed" class="flex items-center text-xl gap-4 font-semibold cursor-pointer" tabindex=0>
                I’m feeling overwhelmed or worried about mental health
                <span x-show="!overwhelmed" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="overwhelmed" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="overwhelmed" class="mt-4">
                <p class="mb-1">
                  If you need to talk now (24/7):
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    Call 111 (press Option 2)
                  </li>
                  <li>
                    <a href="https://www.callhelpline.org.uk/" target="_blank" class="link">C.A.L.L.</a> Helpline → call or text support, in either English or Welsh
                  </li>
                </ul>
                <p>
                  Ongoing support:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>Your GP</li>
                  <li><a href="https://www.mind.org.uk/about-us/mind-cymru/" target="_blank" class="link">Mind Cymru</a></li>
                  <li><a href="https://parents.actionforchildren.org.uk/parent-talk-cymru/" target="_blank" class="link">Parent Talk Cymru</a> → chat with a parenting coach via Whatsapp</li>
                </ul>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="childCries = !childCries" @keyup.enter="childCries = !childCries" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                My child cries a lot or feels hard to manage
                <span x-show="!childCries" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="childCries" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul class="list-disc ml-6 mt-4" x-show="childCries">
                <li>
                  <a href="https://www.cry-sis.org.uk/" target="_blank" class="link">Cry-sis</a> → support with crying and sleepless babies
                </li>
                <li>
                  <a href="https://parents.actionforchildren.org.uk/parent-talk-cymru/" target="_blank" class="link">Parent Talk Cymru</a> → chat with a parenting coach via Whatsapp
                </li>
                <li>
                  <a href="https://www.annafreud.org/" target="_blank" class="link">Anna Freud Centre</a> → parent guides to support a child experiencing mental health difficulties
                </li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="supportDevelopment = !supportDevelopment" @keyup.enter="supportDevelopment = !supportDevelopment" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                I want ideas to support my child’s development
                <span x-show="!supportDevelopment" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="supportDevelopment" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="supportDevelopment" class="mt-4">
                <p>
                  Easy, everyday ideas:
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://www.bbc.co.uk/cbeebies/parenting" target="_blank" class="link">CBeebies Parenting</a>
                  </li>
                  <li>
                    <a href="https://www.playfulchildhoods.wales/" target="_blank" class="link">Play Wales</a>
                  </li>
                </ul>
              </div>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="speakWelsh = !speakWelsh" @keyup.enter="speakWelsh = !speakWelsh" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                I want to raise my child with Welsh
                <span x-show="!speakWelsh" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="speakWelsh" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <ul class="list-disc ml-6" x-show="speakWelsh">
                <li>
                  <a href="https://meithrin.cymru/irieni/?lang=en" target="_blank" class="link">Mudiad Meithrin</a> → playgroups + support
                </li>
                <li>
                  <a href="https://meithrin.cymru/cymraeg-for-kids/?lang=en" target="_blank" class="link">Cymraeg i Blant</a>
                </li>
                <li>
                  <a href="https://www.gov.wales/talk-with-me" target="_blank" class="link">Talk with Me (Siarad Gyda Fi)</a> → tips and activities
                </li>
              </ul>
            </div>
            <hr>
            <div class="p-4 flex flex-col justify-around py-6">
              <a @click.prevent="money = !money" @keyup.enter="money = !money" class="flex items-center gap-4 text-xl font-semibold cursor-pointer" tabindex=0>
                I’m worried about money or benefits
                <span x-show="!money" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_down</span>
                <span x-show="money" class="material-symbols-sharp" aria-hidden="true">keyboard_arrow_up</span>
              </a>
              <div x-show="money" class="mt-4">
                <p>
                  Check what you're entitled to
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://www.turn2us.org.uk/" target="_blank" class="link">Turn2us</a>
                  </li>
                  <li>
                    <a href="https://advicelinkcymru.org.uk/" target="_blank" class="link">Advicelink Cymru</a>
                  </li>
                </ul>

                <p>
                  Speak to someone
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://www.citizensadvice.org.uk/" target="_blank" class="link">Citizens Advice Wales</a>
                  </li>
                </ul>

                <p>
                  Additional support
                </p>
                <ul class="list-disc ml-6 mb-4">
                  <li>
                    <a href="https://applyforhealthystart.nhsbsa.nhs.uk/apply-for-healthy-start/" target="_blank" class="link">Healthy Start Scheme</a> → help with food costs
                  </li>
                </ul>
              </div>
            </div>
          </div>
          <div class="bg-bbc-yellow p-8 mt-8">
            <h2 class="text-3xl">I need urgent help</h2>
            <ul class="list-disc mb-4 pl-6">
              <li>Call 999 → life-threatening emergency</li>
              <li>Call 111 → urgent medical help</li>
            </ul>
            <p>Emotional support (24/7):</p>
            <ul class="list-disc pl-6 mb-4">
              <li><span class=’font-bold’>Samaritans Cymru:</span> Call 116 123</li>
            </ul>

            <p><strong>Not sure where to start?</strong></p>
            <p>Begin with your Health Visitor or Family Information Service. They’ll help you find the right next step!</p>
          </div>
