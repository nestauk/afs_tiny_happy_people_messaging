      free: "<p class='mb-2'>This service is and will always be free to use.</p><p class='mb-2'>The activities shown in these videos reflect a typical developmental journey between 9 and 18 months. If your child has been diagnosed with, or you have concerns about, a speech, language or communication difficulty, or developmental delay, their progress may look different from what you see here.</p><p class='mb-2'>If your child was born prematurely, their development may follow a slightly different timeline, which is completely normal.</p><p class='mb-2'>Many of the activities can still be enjoyed and adapted across a wide range of developmental stages. However, we encourage you to consider your child’s individual needs and, where helpful, seek guidance from a relevant professional to make the most of these activities.</p>"
